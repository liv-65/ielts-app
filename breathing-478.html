<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-7-8 呼吸引导</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1a18; --text-secondary: #5f5e5a; --text-muted: #999890;
    --radius: 8px; --ring-bg: rgba(0,0,0,0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a; --surface: #222224;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
      --text-primary: #f0efe8; --text-secondary: #a0a09a; --text-muted: #666660;
      --ring-bg: rgba(255,255,255,0.07);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text-primary);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 2.5rem 2rem 2rem; gap: 1.3rem; max-width: 420px; width: 100%;
  }
  h1 { font-size: 18px; font-weight: 500; color: var(--text-secondary); letter-spacing:.02em; }
  .phase-label { font-size: 26px; font-weight: 500; color: var(--text-primary); min-height: 36px; }
  .sub-label   { font-size: 14px; color: var(--text-secondary); min-height: 22px; }

  .ring-wrap {
    position: relative; width: 240px; height: 240px;
    display: flex; align-items: center; justify-content: center;
  }
  .ring-svg { position:absolute; top:0; left:0; width:100%; height:100%; transform:rotate(-90deg); }
  .ring-bg  { fill:none; stroke:var(--ring-bg); stroke-width:8; }
  .ring-prog {
    fill:none; stroke-width:8; stroke-linecap:round; stroke:#378ADD;
    stroke-dasharray:659; stroke-dashoffset:659; transition:stroke .6s;
  }
  .inner-circle {
    width:174px; height:174px; border-radius:50%;
    background:var(--surface); border:.5px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; position:relative; z-index:1;
  }
  .count-num { font-size:52px; font-weight:500; color:var(--text-primary); line-height:1; }
  .count-sec { font-size:14px; color:var(--text-secondary); }

  .rounds-row { display:flex; gap:10px; align-items:center; }
  .rounds-label { font-size:13px; color:var(--text-secondary); }
  .dot { width:11px; height:11px; border-radius:50%; border:.5px solid var(--border-strong); background:transparent; transition:background .4s; }
  .dot.done { background:#378ADD; border-color:#378ADD; }

  .controls { display:flex; gap:10px; align-items:center; }
  .btn {
    padding:10px 28px; border-radius:var(--radius); border:.5px solid var(--border-strong);
    background:transparent; color:var(--text-primary); font-size:15px; font-family:inherit;
    cursor:pointer; transition:background .18s, transform .1s;
  }
  .btn:hover { background:var(--surface); }
  .btn:active { transform:scale(.97); }

  .icon-btn {
    width:40px; height:40px; border-radius:50%;
    border:.5px solid var(--border-strong); background:transparent;
    color:var(--text-secondary); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .18s, opacity .2s;
  }
  .icon-btn:hover { background:var(--surface); }
  .icon-btn.off   { opacity:.35; }

  .voice-row {
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--text-secondary);
  }
  .voice-select {
    font-size:13px; font-family:inherit; color:var(--text-primary);
    background:var(--surface); border:.5px solid var(--border-strong);
    border-radius:6px; padding:4px 8px; cursor:pointer; max-width:200px;
  }

  /* music volume row */
  .music-row {
    display:flex; align-items:center; gap:10px;
    font-size:13px; color:var(--text-secondary);
  }
  input[type=range] {
    -webkit-appearance:none; width:100px; height:3px;
    border-radius:2px; background:var(--border-strong); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px;
    border-radius:50%; background:#378ADD; cursor:pointer;
  }

  .tip {
    font-size:13px; color:var(--text-muted);
    text-align:center; line-height:1.7; max-width:300px;
  }

  .bg-hint {
    font-size:11.5px; color:var(--text-muted); text-align:center;
    line-height:1.6; max-width:300px; opacity:.8;
  }

  /* practice log */
  .log-section {
    width:100%; display:flex; flex-direction:column; gap:10px; align-items:center;
    padding-top:14px; margin-top:2px; border-top:.5px solid var(--border);
  }
  .log-header { display:flex; gap:18px; font-size:13px; color:var(--text-secondary); }
  .log-header b { color:var(--text-primary); font-weight:600; font-size:14px; }
  .log-grid { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .log-cell {
    width:15px; height:15px; border-radius:4px;
    background:var(--ring-bg); border:.5px solid var(--border);
  }
  .log-cell.done { background:#378ADD; border-color:#378ADD; }
  .log-cell.today { box-shadow:0 0 0 2px var(--border-strong) inset; }

  .phase-inhale .ring-prog { stroke:#378ADD; }
  .phase-hold   .ring-prog { stroke:#1D9E75; }
  .phase-exhale .ring-prog { stroke:#7F77DD; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <h1>4-7-8 呼吸法</h1>
  <div class="phase-label" id="phaseLabel">准备好了吗？</div>
  <div class="sub-label"   id="subLabel">点击开始，跟着节奏呼吸</div>

  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 240 240">
      <circle class="ring-bg"   cx="120" cy="120" r="105"/>
      <circle class="ring-prog" id="ringProg" cx="120" cy="120" r="105"/>
    </svg>
    <div class="inner-circle">
      <span class="count-num" id="countNum">—</span>
      <span class="count-sec" id="countSec"></span>
    </div>
  </div>

  <div class="rounds-row">
    <span class="rounds-label">轮次</span>
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>

  <div class="controls">
    <button class="btn"      id="mainBtn"  onclick="toggle()">开始</button>
    <button class="icon-btn" id="voiceBtn" title="语音开关"  onclick="toggleMute()">🔊</button>
    <button class="icon-btn" id="musicBtn" title="音乐开关"  onclick="toggleMusic()">🎵</button>
  </div>

  <div class="voice-row" id="voiceRow" style="display:none">
    <span>语音</span>
    <select class="voice-select" id="voiceSelect"></select>
  </div>

  <div class="music-row" id="musicRow" style="display:none">
    <span>音量</span>
    <input type="range" id="volSlider" min="0" max="100" value="40" oninput="setMusicVol(this.value)">
    <span id="volVal">40</span>
  </div>

  <p class="tip" id="tipText">建议做 4 轮，约 1 分钟。<br>鼻子吸气，嘴巴呼气效果最好。</p>
  <p class="bg-hint">提示：手机锁屏后，浏览器可能会暂停声音（系统限制），这是正常现象；回到本页面时进度会自动校准，不会错乱。</p>

  <div class="log-section">
    <div class="log-header">
      <span>🌙 <b id="logTotal">0</b> 次练习</span>
      <span>🔥 <b id="logStreak">0</b> 天连续</span>
    </div>
    <div class="log-grid" id="logGrid"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   BREATHING LOGIC — timestamp-driven so it survives
   setInterval throttling / screen-lock / tab backgrounding.
   Instead of counting ticks, every tick recomputes the current
   round/phase from real elapsed wall-clock time.
═══════════════════════════════ */
const PHASES = [
  { name:"吸气", sub:"用鼻子缓缓吸气",    speech:"吸气，用鼻子缓缓吸气",    sec:4, type:"inhale" },
  { name:"屏气", sub:"轻轻憋住，不要紧张", speech:"屏气，轻轻憋住，不要紧张", sec:7, type:"hold"   },
  { name:"呼气", sub:"用嘴缓缓呼出",      speech:"呼气，用嘴缓缓呼出",      sec:8, type:"exhale" }
];
const TOTAL_ROUNDS   = 4;
const ROUND_DURATION = PHASES.reduce((s,p)=>s+p.sec,0);   // 19s
const TOTAL_DURATION = ROUND_DURATION * TOTAL_ROUNDS;
const CIRCUM = 2 * Math.PI * 105;

let running=false;
let baseElapsed=0;     // seconds accumulated across previous run-segments
let runStartTs=0;      // Date.now() when the current run-segment began
let curRound=0, curPhase=0, lastSecsDisplayed=null;
let ticker=null;

const phaseLabel  = document.getElementById('phaseLabel');
const subLabel    = document.getElementById('subLabel');
const countNum    = document.getElementById('countNum');
const countSec    = document.getElementById('countSec');
const ringProg    = document.getElementById('ringProg');
const mainBtn     = document.getElementById('mainBtn');
const tipText     = document.getElementById('tipText');
const app         = document.getElementById('app');

ringProg.style.strokeDasharray  = CIRCUM;
ringProg.style.strokeDashoffset = CIRCUM;

function setRing(frac, type) {
  ringProg.style.strokeDashoffset = CIRCUM * (1 - frac);
  app.className = 'wrap phase-' + type;
}
function updateDots() {
  for (let i=0;i<TOTAL_ROUNDS;i++)
    document.getElementById('d'+i).classList.toggle('done', i<curRound);
}

function getElapsed() {
  if (!running) return baseElapsed;
  return baseElapsed + (Date.now() - runStartTs) / 1000;
}

// Given total elapsed seconds since the session began, find which
// round / phase / phase-elapsed that corresponds to.
function locate(t) {
  const round = Math.floor(t / ROUND_DURATION);
  let tRound  = t - round * ROUND_DURATION;
  let phase = 0, acc = 0;
  for (; phase < PHASES.length - 1; phase++) {
    if (tRound < acc + PHASES[phase].sec) break;
    acc += PHASES[phase].sec;
  }
  return { round, phase, phaseElapsed: tRound - acc };
}

function enterPhase() {
  updateDots();
  const ph = PHASES[curPhase];
  phaseLabel.textContent = ph.name;
  subLabel.textContent   = ph.sub;
  countNum.textContent   = ph.sec;
  countSec.textContent   = '秒';
  lastSecsDisplayed = ph.sec;
  if (curPhase === 0 && curRound > 0) speak('第' + (curRound+1) + '轮，' + ph.speech);
  else speak(ph.speech);
}

// Central tick: recompute state from wall-clock time. Safe to call
// after any gap (throttled interval, backgrounded tab, screen lock).
function tick() {
  if (!running) return;
  const t = getElapsed();
  if (t >= TOTAL_DURATION) { finish(); return; }

  const { round, phase, phaseElapsed } = locate(t);
  if (round !== curRound || phase !== curPhase) {
    curRound = round; curPhase = phase;
    enterPhase();
  }
  const ph = PHASES[curPhase];
  setRing(Math.min(phaseElapsed / ph.sec, 1), ph.type);
  const secsLeft = Math.max(Math.ceil(ph.sec - phaseElapsed), 1);
  if (secsLeft !== lastSecsDisplayed) {
    lastSecsDisplayed = secsLeft;
    countNum.textContent = secsLeft;
    if (secsLeft <= 3) speak(String(secsLeft));
  }
}

function finish() {
  running = false;
  clearInterval(ticker);
  baseElapsed = TOTAL_DURATION;
  phaseLabel.textContent='做得很好！'; subLabel.textContent='可以安心闭眼了 ✨';
  countNum.textContent=''; countSec.textContent='';
  setRing(1,'inhale'); mainBtn.textContent='再来一轮';
  tipText.textContent='4-7-8 呼吸能激活副交感神经，帮助身体放松入睡。';
  curRound = TOTAL_ROUNDS; updateDots();
  speak('做得很好，可以安心闭眼休息了');
  recordSession();
}

function resetBreath() {
  baseElapsed=0; curRound=0; curPhase=0; lastSecsDisplayed=null;
  updateDots();
  phaseLabel.textContent='准备好了吗？'; subLabel.textContent='点击开始，跟着节奏呼吸';
  countNum.textContent='—'; countSec.textContent='';
  setRing(0,'inhale'); app.className='wrap';
}

function toggle() {
  if (running) {
    // pause: freeze accumulated elapsed time
    baseElapsed = getElapsed();
    running = false;
    clearInterval(ticker);
    window.speechSynthesis && window.speechSynthesis.cancel();
    mainBtn.textContent = '继续';
  } else {
    if (baseElapsed >= TOTAL_DURATION) resetBreath();
    running = true;
    runStartTs = Date.now();
    mainBtn.textContent = '暂停';
    initKeepAlive();               // user-gesture: safe to touch audio here
    if (actx && actx.state === 'suspended') actx.resume();
    clearInterval(ticker);
    ticker = setInterval(tick, 100);
    if (baseElapsed === 0) speak('好，开始第一轮');
    tick();
  }
}

// When the tab/screen comes back, timers may have been throttled or
// fully paused. Recompute immediately instead of waiting for the next
// tick, and resume the audio context if the OS suspended it.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (actx && actx.state === 'suspended') actx.resume().catch(()=>{});
    if (running) tick();
  }
});
window.addEventListener('pageshow', () => { if (running) tick(); });

/* ═══════════════════════════════
   TTS
═══════════════════════════════ */
let muted=false, voices=[], preferredVoice=null;
const voiceBtn    = document.getElementById('voiceBtn');
const voiceRow    = document.getElementById('voiceRow');
const voiceSelect = document.getElementById('voiceSelect');
const synth       = window.speechSynthesis;

function loadVoices() {
  voices = synth.getVoices(); if (!voices.length) return;
  const zh = voices.filter(v=>v.lang.startsWith('zh'));
  const pool = zh.length ? zh : voices;
  voiceSelect.innerHTML='';
  pool.forEach((v,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=v.name+' ('+v.lang+')'; voiceSelect.appendChild(o); });
  preferredVoice=pool[0]; voiceRow.style.display='flex';
  voiceSelect.onchange=()=>{ preferredVoice=pool[parseInt(voiceSelect.value)]; };
}
if (synth) { loadVoices(); if (synth.onvoiceschanged!==undefined) synth.onvoiceschanged=loadVoices; }
function speak(text) {
  if (!synth||muted) return;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=preferredVoice?preferredVoice.lang:'zh-CN'; u.rate=0.88; u.pitch=1;
  if (preferredVoice) u.voice=preferredVoice; synth.speak(u);
}
function toggleMute() {
  muted=!muted; voiceBtn.textContent=muted?'🔇':'🔊';
  voiceBtn.classList.toggle('off',muted); if (muted&&synth) synth.cancel();
}

/* ═══════════════════════════════
   AMBIENT MUSIC  (Web Audio API)
═══════════════════════════════ */
let actx=null, masterGain=null, lpfNode=null, reverbNode=null, musicOn=false, melodyTimer=null;
const musicBtn  = document.getElementById('musicBtn');
const musicRow  = document.getElementById('musicRow');
const volSlider = document.getElementById('volSlider');
const volVal    = document.getElementById('volVal');

// D major pentatonic: D4 E4 F#4 A4 B4 D5
const PENTA = [293.66, 329.63, 369.99, 440.00, 493.88, 587.33];
const MELODY = [0,2,4,5,4,3,2,0,1,3,4,2,1,0,2,3,5,4,2,1];
let melIdx=0;

function makeReverb(ctx, sec) {
  const conv = ctx.createConvolver();
  const len  = Math.floor(ctx.sampleRate * sec);
  const buf  = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c=0;c<2;c++) {
    const ch=buf.getChannelData(c);
    for (let i=0;i<len;i++) ch[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.8);
  }
  conv.buffer=buf; return conv;
}

function makePad(ctx, dest, reverb) {
  const freqs   = [146.83, 220.00, 293.66, 369.99];
  const detunes = [-4, 4, -3, 3];
  freqs.forEach((f,i)=>{
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type='sine'; osc.frequency.value=f; osc.detune.value=detunes[i];
    g.gain.value=0;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.055, ctx.currentTime+3);
    const lfo=ctx.createOscillator(), lg=ctx.createGain();
    lfo.frequency.value=0.12+i*0.02; lg.gain.value=0.008;
    lfo.connect(lg); lg.connect(g.gain); lfo.start();
    osc.connect(g); g.connect(dest); g.connect(reverb); osc.start();
  });
}

function scheduleMelody(ctx, dest, reverb) {
  if (!musicOn) return;
  const freq = PENTA[MELODY[melIdx % MELODY.length]];
  melIdx++;
  const dur  = 2.8 + Math.random()*1.8;
  const now  = ctx.currentTime;
  const osc  = ctx.createOscillator();
  const env  = ctx.createGain();
  osc.type='sine'; osc.frequency.value=freq;
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.10, now+0.9);
  env.gain.setValueAtTime(0.10, now+dur-1.1);
  env.gain.linearRampToValueAtTime(0, now+dur);
  osc.connect(env); env.connect(dest); env.connect(reverb);
  osc.start(now); osc.stop(now+dur+0.05);
  melodyTimer = setTimeout(()=>scheduleMelody(ctx,dest,reverb), (dur-0.6)*1000);
}

// Build the audio graph once; reuse it every time music is toggled
// back on (fixes the old bug where re-enabling music after the first
// toggle silently broke the reverb/lowpass connections).
function ensureAudioGraph() {
  if (actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = actx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(actx.destination);

  reverbNode = makeReverb(actx, 3.5);
  const rvGain = actx.createGain(); rvGain.gain.value=0.45;
  reverbNode.connect(rvGain); rvGain.connect(masterGain);

  lpfNode = actx.createBiquadFilter();
  lpfNode.type='lowpass'; lpfNode.frequency.value=1800;
  lpfNode.connect(masterGain);

  makePad(actx, lpfNode, reverbNode);
}

function startMusic() {
  ensureAudioGraph();
  if (actx.state === 'suspended') actx.resume();
  if (!melodyTimer) scheduleMelody(actx, lpfNode, reverbNode);
  const vol = parseInt(volSlider.value)/100 * 0.6;
  masterGain.gain.cancelScheduledValues(actx.currentTime);
  masterGain.gain.linearRampToValueAtTime(vol, actx.currentTime+1.5);
}

function stopMusic() {
  if (!masterGain) return;
  masterGain.gain.cancelScheduledValues(actx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0, actx.currentTime+1.5);
  clearTimeout(melodyTimer); melodyTimer=null;
}

function toggleMusic() {
  musicOn = !musicOn;
  musicBtn.classList.toggle('off', !musicOn);
  musicRow.style.display = musicOn ? 'flex' : 'none';
  if (musicOn) { initKeepAlive(); startMusic(); } else stopMusic();
}

function setMusicVol(v) {
  volVal.textContent = v;
  if (masterGain && musicOn) {
    const vol = parseInt(v)/100 * 0.6;
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.setValueAtTime(vol, actx.currentTime);
  }
}

/* ═══════════════════════════════
   BACKGROUND-AUDIO HELPER
   Mobile browsers aggressively suspend page audio once the screen
   locks. Registering a MediaSession + a looping silent <audio>
   element (started from a real user tap) signals to the OS that
   this page is "playing media," which noticeably improves how long
   Chrome/Android keeps the tab's audio alive after screen-off.
   iOS Safari remains more restrictive unless the page is added to
   the Home Screen — this is a browser platform limitation, not
   something a web page can fully override.
═══════════════════════════════ */
let keepAliveAudio=null, keepAliveInited=false;
function initKeepAlive() {
  if (keepAliveInited) return;
  keepAliveInited = true;
  try {
    keepAliveAudio = document.createElement('audio');
    keepAliveAudio.loop = true;
    keepAliveAudio.setAttribute('playsinline','');
    keepAliveAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
    keepAliveAudio.play().catch(()=>{});
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: '4-7-8 呼吸引导', artist: '放松练习', album: '呼吸训练'
      });
      navigator.mediaSession.setActionHandler('play', ()=>{});
      navigator.mediaSession.setActionHandler('pause', ()=>{});
    }
  } catch(e) {}
}

/* ═══════════════════════════════
   PRACTICE LOG — records one entry per completed session,
   grouped by calendar day, persisted in localStorage.
═══════════════════════════════ */
const LOG_KEY = 'breathing478_sessions';

function dayKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); }
  catch(e) { return []; }
}
function recordSession() {
  try {
    const list = loadLog();
    list.push(new Date().toISOString());
    localStorage.setItem(LOG_KEY, JSON.stringify(list));
  } catch(e) {}
  renderLog();
}
function renderLog() {
  const list = loadLog();
  const total = list.length;
  const daysSet = new Set(list.map(iso => dayKey(new Date(iso))));

  // current streak: consecutive days with >=1 session, ending today or yesterday
  let streak = 0;
  let cursor = new Date();
  if (!daysSet.has(dayKey(cursor))) cursor.setDate(cursor.getDate() - 1);
  while (daysSet.has(dayKey(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }

  document.getElementById('logTotal').textContent = total;
  document.getElementById('logStreak').textContent = streak;

  const grid = document.getElementById('logGrid');
  grid.innerHTML = '';
  const todayKey = dayKey(new Date());
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = dayKey(d);
    const cell = document.createElement('div');
    cell.className = 'log-cell' + (daysSet.has(key) ? ' done' : '') + (key === todayKey ? ' today' : '');
    cell.title = key + (daysSet.has(key) ? ' · 已练习' : '');
    grid.appendChild(cell);
  }
}

renderLog();
</script>
</body>
</html>
