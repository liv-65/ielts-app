<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片墙 · Photo Wall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #171615;
    --surface: #201f1d;
    --surface-2: #2a2825;
    --line: #3a3733;
    --text: #f2efea;
    --muted: #938d84;
    --amber: #e8a33d;
    --amber-dim: #a97a30;
    --danger: #c8604a;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing: antialiased;
  }

  .shell{
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header.top{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1{
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 34px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .counter{
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: right;
  }
  .counter b{ color: var(--text); font-weight: 500; }

  /* --- Upload zone: "light table" --- */
  .dropzone{
    position: relative;
    border: 1px dashed var(--line);
    border-radius: 4px;
    background:
      repeating-linear-gradient(45deg, transparent 0 10px, rgba(255,255,255,0.012) 10px 20px),
      var(--surface);
    padding: 36px 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 16px;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    margin-bottom: 40px;
    flex-wrap: wrap;
    text-align:center;
  }
  .dropzone:hover, .dropzone.drag{
    border-color: var(--amber-dim);
    background: var(--surface-2);
  }
  .dropzone svg{ flex-shrink:0; opacity:0.75; }
  .dz-text .dz-title{
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .dz-text .dz-sub{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  input[type="file"]{ display:none; }

  /* --- Toolbar --- */
  .toolbar{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar .hint{
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-group{ display:flex; gap:10px; }

  button.action{
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all .15s ease;
  }
  button.action:hover{ border-color: var(--amber-dim); background: var(--surface-2); }
  button.action.primary{
    background: var(--amber);
    border-color: var(--amber);
    color: #211a0e;
    font-weight: 600;
  }
  button.action.primary:hover{ background: #f0b04f; }
  button.action:disabled{ opacity:0.4; cursor:not-allowed; }
  button.action.ghost{ color: var(--muted); }
  button.action.ghost:hover{ color: var(--danger); border-color: var(--danger); background: transparent; }

  /* --- Wall container (exported) --- */
  #wallWrap{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px;
  }

  #wall{
    background: var(--surface);
  }

  .empty-state{
    padding: 60px 20px;
    text-align:center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* grid mode: <=9 photos, adaptive square-ish grid */
  #wall.grid-mode{
    display:grid;
    gap: 10px;
  }
  .photo-cell{
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    background: #000;
  }
  #wall.grid-mode .photo-cell{
    aspect-ratio: 1 / 1;
  }
  .photo-cell img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }

  /* masonry mode: >9 photos, free-form columns */
  #wall.masonry-mode{
    column-gap: 10px;
    column-width: 230px;
  }
  #wall.masonry-mode .photo-cell{
    break-inside: avoid;
    margin-bottom: 10px;
  }
  #wall.masonry-mode .photo-cell img{
    height:auto;
  }

  /* date-stamp: signature element, mimics camera-print timestamp */
  .stamp{
    position:absolute;
    right: 6px;
    bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.02em;
    color: #ffb54d;
    background: rgba(0,0,0,0.0);
    text-shadow:
      0 0 1px rgba(255,150,20,0.6),
      0.5px 0.5px 0px rgba(0,0,0,0.9);
    pointer-events:none;
    user-select:none;
  }

  .remove-btn{
    position:absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: none;
    color: #fff;
    font-size: 14px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity: 0;
    transition: opacity .15s ease, background .15s ease;
  }
  .photo-cell:hover .remove-btn{ opacity: 1; }
  .remove-btn:hover{ background: var(--danger); }

  footer.note{
    margin-top: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--muted);
    text-align:center;
  }

  @media (max-width: 600px){
    h1{ font-size: 26px; }
    header.top{ flex-direction:column; align-items:flex-start; }
    .counter{ text-align:left; }
  }
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <div>
      <div class="eyebrow">Photo Wall · 单一入口上传</div>
      <h1>照片墙</h1>
    </div>
    <div class="counter">已上传 <b id="countNum">0</b> 张照片</div>
  </header>

  <div class="dropzone" id="dropzone">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e8a33d" stroke-width="1.4">
      <rect x="3" y="5" width="18" height="14" rx="1.5"/>
      <circle cx="8.5" cy="10" r="1.5"/>
      <path d="M21 15l-5-5-4 4-3-3-6 6"/>
    </svg>
    <div class="dz-text">
      <div class="dz-title">点击或拖拽照片到此处上传</div>
      <div class="dz-sub">支持多选 · 上传时间将自动记录</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="toolbar">
    <div class="hint" id="modeHint">等待上传照片</div>
    <div class="btn-group">
      <button class="action ghost" id="clearBtn" disabled>清空</button>
      <button class="action primary" id="exportBtn" disabled>导出为一页</button>
    </div>
  </div>

  <div id="wallWrap">
    <div id="wall">
      <div class="empty-state" id="emptyState">照片将在此处自适应排列<br>≤ 9 张 → 自适应网格　·　＞ 9 张 → 自由排版</div>
    </div>
  </div>

  <footer class="note">导出时会将当前排版整体渲染为一张 PNG 图片，保存到本地</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  const photos = []; // {id, url, time: Date, name}
  let nextId = 1;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const wall = document.getElementById('wall');
  const emptyState = document.getElementById('emptyState');
  const countNum = document.getElementById('countNum');
  const clearBtn = document.getElementById('clearBtn');
  const exportBtn = document.getElementById('exportBtn');
  const modeHint = document.getElementById('modeHint');

  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  ['dragenter','dragover'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.add('drag');
    });
  });
  ['dragleave','drop'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.remove('drag');
    });
  });
  dropzone.addEventListener('drop', e => {
    handleFiles(e.dataTransfer.files);
  });

  function handleFiles(fileList){
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if(!files.length) return;
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      photos.push({
        id: nextId++,
        url,
        time: new Date(), // 自动记录实际上传时间
        name: file.name
      });
    });
    fileInput.value = '';
    render();
  }

  function formatStamp(d){
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function removePhoto(id){
    const idx = photos.findIndex(p => p.id === id);
    if(idx > -1){
      URL.revokeObjectURL(photos[idx].url);
      photos.splice(idx, 1);
      render();
    }
  }

  function gridColumns(n){
    // 自适应列数：接近正方形排布，9 张时自然形成 3x3，但并非强制
    return Math.max(1, Math.ceil(Math.sqrt(n)));
  }

  function render(){
    const n = photos.length;
    countNum.textContent = n;
    clearBtn.disabled = n === 0;
    exportBtn.disabled = n === 0;

    wall.className = '';
    wall.innerHTML = '';

    if(n === 0){
      wall.appendChild(emptyState);
      modeHint.textContent = '等待上传照片';
      return;
    }

    if(n <= 9){
      wall.classList.add('grid-mode');
      const cols = gridColumns(n);
      wall.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      modeHint.textContent = `自适应网格模式 · ${cols} 列`;
    } else {
      wall.classList.add('masonry-mode');
      wall.style.gridTemplateColumns = '';
      modeHint.textContent = `自由排版模式 · 共 ${n} 张`;
    }

    photos.forEach(p => {
      const cell = document.createElement('div');
      cell.className = 'photo-cell';

      const img = document.createElement('img');
      img.src = p.url;
      cell.appendChild(img);

      const stamp = document.createElement('div');
      stamp.className = 'stamp';
      stamp.textContent = formatStamp(p.time);
      cell.appendChild(stamp);

      const rmBtn = document.createElement('button');
      rmBtn.className = 'remove-btn';
      rmBtn.innerHTML = '&times;';
      rmBtn.title = '移除';
      rmBtn.onclick = (e) => { e.stopPropagation(); removePhoto(p.id); };
      cell.appendChild(rmBtn);

      wall.appendChild(cell);
    });
  }

  clearBtn.addEventListener('click', () => {
    photos.forEach(p => URL.revokeObjectURL(p.url));
    photos.length = 0;
    render();
  });

  exportBtn.addEventListener('click', async () => {
    exportBtn.disabled = true;
    exportBtn.textContent = '导出中…';
    // 隐藏移除按钮，避免出现在导出图中
    document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'none');
    try{
      const target = document.getElementById('wallWrap');
      const canvas = await html2canvas(target, {
        backgroundColor: '#201f1d',
        scale: Math.min(2, window.devicePixelRatio || 1.5),
        useCORS: true
      });
      const link = document.createElement('a');
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      link.download = `photo-wall-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(err){
      alert('导出失败，请重试：' + err.message);
    } finally {
      document.querySelectorAll('.remove-btn').forEach(b => b.style.display = '');
      exportBtn.disabled = false;
      exportBtn.textContent = '导出为一页';
    }
  });

  render();
</script>
</body>
</html>
