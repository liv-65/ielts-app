<div id="app"></div>
<style>
  #app {
    --paper: #F3F1E9;
    --ink: #F3F1E9;
    --pine: #38D6D0;
    --pine-deep: #E23B8B;
    --seal: #F2B705;
    --amber: #F2B705;
    --sprout: #38D6D0;
    --line: rgba(243,241,233,0.22);
    --card: rgba(255,255,255,0.055);

    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse 900px 600px at 15% 10%, rgba(56,214,208,0.16), transparent 60%),
      repeating-linear-gradient(115deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 15px),
      linear-gradient(165deg, #1C3FA8 0%, #101B4D 45%, #070A18 100%);
    min-height: 100%;
    padding: 28px 20px 40px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  #app * { box-sizing: border-box; }

  .title-block { text-align: center; }
  .title-block h1 {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 30px;
    font-weight: 800;
    margin: 0 0 4px;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 24px rgba(56,214,208,0.25);
  }
  .title-block p {
    margin: 0;
    font-size: 13px;
    color: var(--pine);
    opacity: 0.75;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 1px 0 var(--line), 0 8px 28px -10px rgba(3,6,20,0.55);
    border: 1px solid var(--line);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  /* task chips */
  .task-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 18px;
  }
  .task-chip {
    border: 1.5px solid var(--line);
    background: transparent;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .15s ease;
  }
  .task-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .task-chip.active {
    background: var(--pine-deep);
    color: var(--paper);
    border-color: var(--pine-deep);
  }

  /* timer ring */
  .timer-wrap {
    display: flex;
    justify-content: center;
    margin: 6px 0 14px;
    position: relative;
  }
  .toast-pop {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--pine-deep);
    color: var(--paper);
    font-size: 13.5px;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 999px;
    white-space: nowrap;
    z-index: 4;
    animation: toastBounce 1.3s cubic-bezier(.34,1.56,.64,1) forwards;
    pointer-events: none;
  }
  @keyframes toastBounce {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(0.4) rotate(-6deg); }
    35% { opacity: 1; transform: translate(-50%, -6px) scale(1.15) rotate(3deg); }
    55% { transform: translate(-50%, 0) scale(0.98) rotate(-1deg); }
    75% { opacity: 1; transform: translate(-50%, -2px) scale(1.03) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -18px) scale(0.9); }
  }
  .burst-emoji {
    position: absolute;
    top: 55%;
    z-index: 3;
    pointer-events: none;
    animation: burstUp 1.1s ease-out forwards;
  }
  @keyframes burstUp {
    0% { opacity: 0; transform: translate(-50%, 0) rotate(0deg) scale(0.4); }
    20% { opacity: 1; transform: translate(calc(-50% + var(--drift) * 0.3), -20px) rotate(var(--rotate)) scale(1.1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--drift)), -110px) rotate(var(--rotate)) scale(0.9); }
  }
  @media (prefers-reduced-motion: reduce) {
    .toast-pop { animation: none; opacity: 1; }
    .burst-emoji { display: none; }
  }
  .timer-num {
    font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    font-size: 30px;
    font-weight: 600;
    fill: var(--ink);
  }
  .timer-label {
    font-size: 11px;
    fill: var(--pine);
    opacity: 0.7;
  }

  /* duration presets */
  .dur-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .dur-chip {
    border: 1.5px solid var(--line);
    background: transparent;
    border-radius: 10px;
    padding: 6px 10px;
    min-width: 44px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--pine);
  }
  .dur-chip.active {
    background: var(--seal);
    border-color: var(--seal);
    color: #0B1220;
  }

  .main-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .btn {
    border: none;
    border-radius: 14px;
    padding: 13px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .1s ease, opacity .15s ease;
    flex: 1 1 140px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--pine-deep); color: var(--paper); }
  .btn-ghost { background: transparent; color: var(--pine); border: 1.5px solid var(--line); }
  .btn:disabled { opacity: 0.45; cursor: default; }

  .soft-note {
    text-align: center;
    font-size: 12px;
    color: var(--pine);
    opacity: 0.65;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* end-of-session prompt */
  .prompt-box {
    background: rgba(242,183,5,0.14);
    border: 1px solid rgba(242,183,5,0.4);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    margin-bottom: 14px;
  }
  .prompt-box p { margin: 0 0 10px; font-size: 13.5px; font-weight: 600; }
  .prompt-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .prompt-btn {
    border-radius: 10px;
    border: none;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .prompt-btn.continue { background: var(--pine); color: #fff; }
  .prompt-btn.rest { background: var(--amber); color: #0B1220; }

  /* forest */
  .forest-card { max-width: 420px; width: 100%; }
  .forest-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .forest-head h2 {
    font-family: 'Georgia', serif;
    font-size: 15px;
    margin: 0;
  }
  .forest-stats { font-size: 12px; color: var(--pine); opacity: 0.75; }
  .forest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 10px;
    min-height: 40px;
    align-items: end;
  }
  .tree-slot {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 40px;
  }
  .tree-delete {
    position: absolute;
    top: -6px;
    right: -2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: none;
    background: rgba(6,10,25,0.8);
    color: #F3F1E9;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .15s ease;
    z-index: 2;
  }
  .tree-slot:hover .tree-delete,
  .tree-slot:focus-within .tree-delete {
    opacity: 1;
  }
  .empty-forest {
    font-size: 12.5px;
    color: var(--pine);
    opacity: 0.55;
    text-align: center;
    padding: 10px 0;
    grid-column: 1 / -1;
  }

  @keyframes pop {
    0% { transform: scale(0.2); opacity: 0; }
    70% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }
  .tree-new { animation: pop .45s ease-out; }

  @media (prefers-reduced-motion: reduce) {
    .tree-new { animation: none; }
  }
  @media (max-width: 400px) {
    #app { padding: 20px 12px 32px; gap: 16px; }
    .card { padding: 16px; }
    .title-block h1 { font-size: 25px; }
    .title-block p { font-size: 12px; }
    .timer-num { font-size: 26px; }
    .btn { padding: 12px 16px; font-size: 14px; }
    .dur-chip { font-size: 11px; padding: 6px 8px; min-width: 38px; }
  }
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPABASE_URL = 'https://qhxodrovsruyqpwjbxqx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_to_Ogr1hdbajSLBIjR6TJA_JRccD-oS';
const TABLE = 'forest_trees';

let supabaseClientPromise = null;
function getSupabase() {
  if (!supabaseClientPromise) {
    supabaseClientPromise = import('https://esm.sh/@supabase/supabase-js@2')
      .then(({ createClient }) => createClient(SUPABASE_URL, SUPABASE_KEY));
  }
  return supabaseClientPromise;
}

const TASKS = [
  { id: 'listening', label: 'Listening', color: '#38D6D0' },
  { id: 'reading',   label: 'Reading', color: '#E23B8B' },
  { id: 'writing',   label: 'Writing', color: '#F2B705' },
  { id: 'speaking',  label: 'Speaking', color: '#9B8CFF' },
];

const DURATIONS = [10, 15, 25, 45];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function Pine({ color, size = 1, seal }) {
  // simple stacked-triangle pine tree, seal = tiny stamp dot for completed session
  const w = 30 * size, h = 34 * size;
  return (
    <svg viewBox="0 0 30 34" style={{ width: w, height: h, maxWidth: 64, maxHeight: 72 }}>
      <rect x="13" y="26" width="4" height="7" fill="#9A7B4F" />
      <polygon points="15,2 26,17 4,17" fill={color} opacity="0.95" />
      <polygon points="15,10 24,23 6,23" fill={color} />
      {seal && <circle cx="24" cy="6" r="4" fill="#F2B705" opacity="0.95" />}
    </svg>
  );
}

function Sprout({ color, size = 1 }) {
  const w = 30 * size, h = 34 * size;
  return (
    <svg viewBox="0 0 30 34" style={{ width: w, height: h, maxWidth: 64, maxHeight: 72 }}>
      <rect x="14" y="20" width="2" height="10" fill="#9A7B4F" />
      <path d="M15 20 C 8 18, 6 12, 9 8 C 12 12, 14 16, 15 20 Z" fill={color} opacity="0.85"/>
      <path d="M15 20 C 22 18, 24 13, 21 9 C 18 13, 16 17, 15 20 Z" fill={color} opacity="0.85"/>
    </svg>
  );
}

function playChime(full) {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    const notes = full ? [1046.5, 1318.5, 1568.0, 2093.0] : [1046.5, 1318.5];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = ctx.currentTime + i * 0.09;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.16, start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.28);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + 0.3);
    });
    setTimeout(() => ctx.close(), (notes.length * 0.09 + 0.4) * 1000);
  } catch (e) { console.error('chime failed', e); }
}

function App() {
  const [taskId, setTaskId] = useState('listening');
  const [duration, setDuration] = useState(15);
  const [customMode, setCustomMode] = useState(false);
  const [secondsLeft, setSecondsLeft] = useState(15 * 60);
  const [running, setRunning] = useState(false);
  const [phase, setPhase] = useState('idle'); // idle | focus | overtime | break | ended
  const [trees, setTrees] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [newestId, setNewestId] = useState(null);
  const [celebration, setCelebration] = useState(null); // { msg, particles: [] }
  const [syncStatus, setSyncStatus] = useState('checking'); // checking | synced | offline
  const intervalRef = useRef(null);
  const startedAtRef = useRef(null);
  const supabaseRef = useRef(null);

  // load trees: try Supabase first, fall back to local cache if unreachable
  useEffect(() => {
    let channel;
    (async () => {
      try {
        const sb = await getSupabase();
        const { data, error } = await sb
          .from(TABLE)
          .select('*')
          .order('created_at', { ascending: true });
        if (error) throw error;
        supabaseRef.current = sb;
        const mapped = (data || []).map(r => ({
          id: r.id, date: r.date, type: r.type, color: r.color, full: r.is_full, minutes: r.minutes,
        }));
        setTrees(mapped);
        setSyncStatus('synced');

        channel = sb
          .channel('forest-trees-changes')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: TABLE }, (payload) => {
            setTrees(prev => prev.some(t => t.id === payload.new.id)
              ? prev
              : [...prev, {
                  id: payload.new.id, date: payload.new.date, type: payload.new.type,
                  color: payload.new.color, full: payload.new.is_full, minutes: payload.new.minutes,
                }]);
          })
          .subscribe();
      } catch (e) {
        console.error('Supabase unavailable, using local cache:', e);
        try {
          const res = await window.storage.get('forest-trees', false);
          if (res && res.value) setTrees(JSON.parse(res.value));
        } catch (e2) { /* no local cache yet */ }
        setSyncStatus('offline');
      }
      setLoaded(true);
    })();
    return () => { if (channel) channel.unsubscribe(); };
  }, []);

  // always keep a local cache as backup, regardless of sync status
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set('forest-trees', JSON.stringify(trees), false);
      } catch (e) { console.error('local cache save failed', e); }
    })();
  }, [trees, loaded]);

  useEffect(() => {
    if (!customMode) setSecondsLeft(duration * 60);
  }, [duration]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setSecondsLeft(s => {
          if (s <= 1) {
            setPhase('overtime');
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const format = (s) => {
    const m = Math.floor(Math.abs(s) / 60).toString().padStart(2, '0');
    const sec = (Math.abs(s) % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  };

  const start = () => {
    startedAtRef.current = Date.now();
    setPhase('focus');
    setRunning(true);
  };

  const planTree = async (full) => {
    const task = TASKS.find(t => t.id === taskId);
    const elapsedMin = startedAtRef.current
      ? Math.max(1, Math.round((Date.now() - startedAtRef.current) / 60000))
      : duration;
    const entry = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
      date: todayStr(),
      type: taskId,
      color: task.color,
      full,
      minutes: elapsedMin,
    };
    setTrees(prev => [...prev, entry]);
    setNewestId(entry.id);
    setTimeout(() => setNewestId(null), 600);
    playChime(full);
    const emojiPool = full ? ['\uD83C\uDF32', '\uD83C\uDF32', '\u2728', '\uD83C\uDF32', '\u2728', '\uD83C\uDF89'] : ['\uD83C\uDF31', '\u2728', '\uD83C\uDF31'];
    const particles = Array.from({ length: full ? 7 : 5 }, (_, i) => ({
      id: `${entry.id}-p${i}`,
      emoji: emojiPool[Math.floor(Math.random() * emojiPool.length)],
      left: 50 + (Math.random() * 70 - 35),
      rotate: Math.random() * 60 - 30,
      delay: Math.random() * 0.15,
      drift: Math.random() * 40 - 20,
      size: 16 + Math.random() * 10,
    }));
    setCelebration({ msg: full ? '\uD83C\uDF32 Tree planted!' : '\uD83C\uDF31 Sprout saved!', particles });
    setTimeout(() => setCelebration(null), 1300);

    if (supabaseRef.current) {
      try {
        const { id, date, type, color, minutes } = entry;
        const row = { id, date, type, color, minutes, is_full: entry.full };
        const { error } = await supabaseRef.current.from(TABLE).insert(row);
        if (error) throw error;
        setSyncStatus('synced');
      } catch (e) {
        console.error('sync insert failed, kept locally:', e);
        setSyncStatus('offline');
      }
    }
  };

  const deleteTree = async (id) => {
    const target = trees.find(t => t.id === id);
    if (!target || target.date !== todayStr()) return; // locked once the day has passed
    setTrees(prev => prev.filter(t => t.id !== id));
    if (supabaseRef.current) {
      try {
        const { error } = await supabaseRef.current.from(TABLE).delete().eq('id', id);
        if (error) throw error;
      } catch (e) {
        console.error('sync delete failed:', e);
        setSyncStatus('offline');
      }
    }
  };

  const treeSize = (minutes) => {
    const m = minutes || 15;
    return Math.min(1.9, 0.55 + m / 35);
  };

  const finishFull = () => {
    planTree(true);
    setRunning(false);
    setPhase('idle');
    setSecondsLeft(duration * 60);
  };

  const stopEarly = () => {
    // ADHD-friendly: interruption still counts, just as a sprout not a full tree
    planTree(false);
    setRunning(false);
    setPhase('idle');
    setSecondsLeft(duration * 60);
  };

  const keepGoing = () => {
    setPhase('focus');
  };

  const todayTrees = trees.filter(t => t.date === todayStr());
  const totalTrees = trees.length;

  const currentTaskColor = TASKS.find(t => t.id === taskId).color;
  const progress = phase === 'overtime' ? 1 : 1 - secondsLeft / (duration * 60);
  const R = 70, C = 2 * Math.PI * R;
  const dash = C * (1 - progress);

  const cx = 90, cy = 90, clipR = R + 12;
  const sweep = Math.min(progress, 0.9999) * 360;
  const rad = (deg) => (deg - 90) * Math.PI / 180;
  const endX = cx + clipR * Math.cos(rad(sweep));
  const endY = cy + clipR * Math.sin(rad(sweep));
  const largeArc = sweep > 180 ? 1 : 0;
  const pieClipD = progress <= 0
    ? `M ${cx} ${cy} Z`
    : `M ${cx} ${cy} L ${cx} ${cy - clipR} A ${clipR} ${clipR} 0 ${largeArc} 1 ${endX} ${endY} Z`;

  return (
    <div id="app">
      <div className="title-block">
        <h1>Study Forest</h1>
        <p>You choose the length - interruptions still count - plant a tree per focus session</p>
      </div>

      <div className="card">
        <div className="task-row">
          {TASKS.map(t => (
            <button
              key={t.id}
              className={`task-chip ${taskId === t.id ? 'active' : ''}`}
              onClick={() => setTaskId(t.id)}
              disabled={running}
            >
              <span className="dot" style={{ background: t.color }}></span>
              {t.label}
            </button>
          ))}
        </div>

        <div className="timer-wrap">
          {celebration && (
            <>
              <div className="toast-pop">{celebration.msg}</div>
              {celebration.particles.map(p => (
                <span
                  key={p.id}
                  className="burst-emoji"
                  style={{
                    left: `${p.left}%`,
                    fontSize: `${p.size}px`,
                    animationDelay: `${p.delay}s`,
                    '--rotate': `${p.rotate}deg`,
                    '--drift': `${p.drift}px`,
                  }}
                >{p.emoji}</span>
              ))}
            </>
          )}
          <svg width="180" height="180" viewBox="0 0 180 180">
            <defs>
              <clipPath id="progressClip">
                <path d={pieClipD} />
              </clipPath>
            </defs>
            <circle
              cx="90" cy="90" r={R} fill="none"
              stroke="var(--line)" strokeWidth="9"
              strokeLinecap="round"
              strokeDasharray="1 10.5"
            />
            <circle
              cx="90" cy="90" r={R} fill="none"
              stroke={phase === 'overtime' ? 'var(--seal)' : currentTaskColor}
              strokeWidth="9"
              strokeLinecap="round"
              strokeDasharray="1 10.5"
              clipPath="url(#progressClip)"
            />
            <text x="90" y="84" textAnchor="middle" className="timer-num">
              {phase === 'overtime' ? `+${format(Math.floor((Date.now()-startedAtRef.current)/1000) - duration*60)}` : format(secondsLeft)}
            </text>
            <text x="90" y="104" textAnchor="middle" className="timer-label">
              {phase === 'idle' && 'Start when ready'}
              {phase === 'focus' && 'Focusing'}
              {phase === 'overtime' && 'Still in it - keep going'}
            </text>
          </svg>
        </div>

        {phase === 'idle' && (
          <>
            <div className="dur-row">
              {DURATIONS.map(d => (
                <button key={d} className={`dur-chip ${!customMode && duration === d ? 'active' : ''}`}
                  onClick={() => { setCustomMode(false); setDuration(d); }}>
                  {d}m
                </button>
              ))}
              <button className={`dur-chip ${customMode ? 'active' : ''}`}
                onClick={() => setCustomMode(true)}>Custom</button>
            </div>
            {customMode && (
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:10, marginBottom:16}}>
                <button className="btn btn-ghost" style={{padding:'6px 12px'}}
                  onClick={() => setDuration(d => Math.max(3, d-5))}>-5</button>
                <span style={{fontWeight:700, fontSize:15}}>{duration} min</span>
                <button className="btn btn-ghost" style={{padding:'6px 12px'}}
                  onClick={() => setDuration(d => Math.min(90, d+5))}>+5</button>
              </div>
            )}
          </>
        )}

        {phase === 'overtime' && (
          <div className="prompt-box">
            <p>Time's up - how are you feeling?</p>
            <div className="prompt-actions">
              <button className="prompt-btn continue" onClick={keepGoing}>Still in it, keep going</button>
              <button className="prompt-btn rest" onClick={finishFull}>Plant tree, take a break</button>
            </div>
          </div>
        )}

        <div className="main-actions">
          {phase === 'idle' && (
            <button className="btn btn-primary" onClick={start}>Start focusing</button>
          )}
          {(phase === 'focus') && (
            <>
              <button className="btn btn-ghost" onClick={stopEarly}>Stop early (still counts)</button>
              <button className="btn btn-primary" onClick={finishFull}>Done</button>
            </>
          )}
        </div>

        <p className="soft-note">
          Losing focus or getting interrupted is fine - stopping early still plants a sprout. No need to start over.
        </p>
      </div>

      <div className="card forest-card">
        <div className="forest-head">
          <h2>My Forest</h2>
          <span className="forest-stats">
            {syncStatus === 'synced' && 'Synced - '}
            {syncStatus === 'offline' && 'Offline (saved locally) - '}
            {syncStatus === 'checking' && 'Connecting... - '}
            Today {todayTrees.length} - Total {totalTrees}
          </span>
        </div>
        <div className="forest-grid">
          {trees.length === 0 && <div className="empty-forest">No trees yet - start your first focus session</div>}
          {trees.slice().reverse().map(t => (
            <div key={t.id} className={`tree-slot ${t.id === newestId ? 'tree-new' : ''}`}>
              {t.date === todayStr() && (
                <button
                  className="tree-delete"
                  onClick={() => deleteTree(t.id)}
                  title="Remove this tree"
                  aria-label="Remove this tree"
                >&times;</button>
              )}
              {t.full
                ? <Pine color={t.color} size={treeSize(t.minutes)} seal />
                : <Sprout color={t.color} size={treeSize(t.minutes)} />}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
