<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思写作地道搭配 · 练习复习</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --card: #222640;
    --border: #2e3255;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --text: #e8eaf6;
    --muted: #8b8fa8;
    --correct: #43e97b;
    --wrong: #ff6584;
    --yellow: #f7c948;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── NAV ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  .logo span { color: var(--accent); }
  .stats-bar { display: flex; gap: 20px; font-size: 13px; color: var(--muted); }
  .stats-bar b { color: var(--text); }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 0 24px;
  }
  .tab {
    padding: 12px 20px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* ── MAIN ── */
  main { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }

  /* ── MODE PICKER ── */
  .mode-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    margin-bottom: 28px;
  }
  .mode-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 14px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .mode-btn:hover { border-color: var(--accent); background: #2a2e50; }
  .mode-btn.active { border-color: var(--accent); background: #2a2e50; box-shadow: 0 0 0 3px #6c63ff22; }
  .mode-btn .icon { font-size: 28px; margin-bottom: 8px; }
  .mode-btn .name { font-size: 14px; font-weight: 600; }
  .mode-btn .desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── BROWSE CARDS ── */
  .browse-grid { display: grid; gap: 16px; }
  .phrase-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    transition: border-color .2s;
  }
  .phrase-card:hover { border-color: var(--accent); }
  .phrase-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .phrase-en { font-size: 17px; font-weight: 700; color: #c9c4ff; line-height: 1.4; }
  .phrase-cn { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 20px; padding: 2px; flex-shrink: 0; line-height: 1;
  }
  .example-toggle {
    margin-top: 12px;
    font-size: 13px; color: var(--accent); cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    background: none; border: none; padding: 0;
  }
  .example-box {
    margin-top: 10px;
    background: #16192a;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    display: none;
  }
  .example-box.open { display: block; }
  .example-en { font-size: 14px; line-height: 1.7; color: var(--text); }
  .example-note { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  .tag {
    display: inline-block;
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: #2e3255; color: var(--accent); margin-bottom: 8px;
  }

  /* ── FLASHCARD ── */
  .flashcard-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .fc-progress { width: 100%; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .fc-progress-bar { height: 100%; background: var(--accent); transition: width .4s; }
  .fc-counter { font-size: 13px; color: var(--muted); align-self: flex-end; }
  .flashcard {
    width: 100%; min-height: 300px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .1s;
    user-select: none;
  }
  .flashcard:active { transform: scale(.98); }
  .fc-tag { color: var(--accent); font-size: 13px; margin-bottom: 12px; }
  .fc-front .fc-phrase { font-size: 22px; font-weight: 700; color: #c9c4ff; line-height: 1.5; }
  .fc-front .fc-hint { font-size: 14px; color: var(--muted); margin-top: 16px; }
  .fc-back { display: none; }
  .fc-back.visible { display: block; }
  .fc-cn { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .fc-example { font-size: 14px; color: var(--text); line-height: 1.7; text-align: left; }
  .fc-note { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: left; line-height: 1.6; }
  .fc-actions { display: flex; gap: 12px; width: 100%; }
  .fc-btn {
    flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 15px; font-weight: 600; transition: filter .15s;
  }
  .fc-btn:hover { filter: brightness(1.1); }
  .fc-btn.again { background: #3a1a1a; color: var(--wrong); }
  .fc-btn.hard { background: #3a2d0a; color: var(--yellow); }
  .fc-btn.good { background: #1a2e2a; color: var(--correct); }
  .fc-btn.easy { background: #1a1e3a; color: var(--accent); }
  .flip-hint { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* ── QUIZ ── */
  .quiz-wrap { display: flex; flex-direction: column; gap: 20px; }
  .quiz-q {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
  }
  .quiz-label { font-size: 12px; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .quiz-sentence {
    font-size: 18px; line-height: 1.8; color: var(--text);
    background: #16192a; border-radius: 10px; padding: 16px 18px;
    margin-bottom: 20px;
  }
  .blank {
    display: inline-block;
    min-width: 140px; height: 28px;
    border-bottom: 2px solid var(--accent);
    vertical-align: bottom; text-align: center;
    color: var(--accent); font-weight: 700;
    position: relative;
  }
  .quiz-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 13px 16px;
    background: #16192a;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: #2a2e50; }
  .choice-btn.correct { border-color: var(--correct); background: #0d2e1e; color: var(--correct); }
  .choice-btn.wrong { border-color: var(--wrong); background: #2e0d1a; color: var(--wrong); }
  .choice-btn:disabled { cursor: default; }
  .quiz-feedback {
    margin-top: 14px; padding: 14px 16px;
    border-radius: 10px; font-size: 14px; line-height: 1.6;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: #0d2e1e; color: var(--correct); }
  .quiz-feedback.no { background: #2e0d1a; color: var(--wrong); }
  .next-btn {
    padding: 14px 32px; border-radius: 12px;
    background: var(--accent); color: #fff; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    align-self: center; display: none; transition: filter .15s;
  }
  .next-btn:hover { filter: brightness(1.1); }
  .next-btn.show { display: block; }

  /* ── FILL BLANK ── */
  .fill-input {
    background: #16192a; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    color: var(--text); font-size: 16px; width: 100%;
    margin-top: 14px; outline: none; transition: border-color .2s;
  }
  .fill-input:focus { border-color: var(--accent); }
  .submit-btn {
    padding: 12px 28px; border-radius: 10px;
    background: var(--accent); color: #fff; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    margin-top: 12px; transition: filter .15s;
  }
  .submit-btn:hover { filter: brightness(1.1); }

  /* ── RESULTS ── */
  .results-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; text-align: center;
  }
  .results-score { font-size: 60px; font-weight: 800; color: var(--accent); }
  .results-pct { font-size: 20px; color: var(--muted); margin-top: 4px; }
  .results-msg { font-size: 17px; margin-top: 16px; }
  .retry-btn {
    margin-top: 24px; padding: 14px 36px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* ── EMPTY / UTIL ── */
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--muted);
    margin-bottom: 14px; text-transform: uppercase; letter-spacing: .8px;
  }
  .chip {
    display: inline-block; font-size: 12px; padding: 3px 10px;
    border-radius: 20px; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; margin: 3px;
    transition: all .15s;
  }
  .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: #2a2e50; }
  .topic-filter { margin-bottom: 20px; }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; font-size: 15px; }
  @media (max-width: 600px) {
    .mode-grid { grid-template-columns: 1fr 1fr; }
    .quiz-choices { grid-template-columns: 1fr; }
    .fc-front .fc-phrase { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">雅思写作 <span>地道搭配</span></div>
  <div class="stats-bar">
    <div>已学 <b id="learnedCount">0</b></div>
    <div>收藏 <b id="starCount">0</b></div>
    <div>正确率 <b id="accuracyPct">—</b></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="browse">📖 浏览</div>
  <div class="tab" data-tab="flash">🃏 闪卡</div>
  <div class="tab" data-tab="quiz">✏️ 选择题</div>
  <div class="tab" data-tab="fill">⌨️ 填空</div>
  <div class="tab" data-tab="stars">⭐ 收藏</div>
</div>

<main>
  <!-- BROWSE -->
  <section id="tab-browse">
    <div class="topic-filter" id="topicFilter"></div>
    <div id="browseList"></div>
  </section>

  <!-- FLASH -->
  <section id="tab-flash" style="display:none">
    <div class="topic-filter" id="flashFilter"></div>
    <div class="mode-grid" style="margin-bottom:20px">
      <div class="mode-btn active" data-pool="all" id="poolAll"><div class="icon">📚</div><div class="name">全部</div><div class="desc">7 大话题</div></div>
      <div class="mode-btn" data-pool="weak" id="poolWeak"><div class="icon">🎯</div><div class="name">薄弱</div><div class="desc">再次/困难</div></div>
      <div class="mode-btn" data-pool="stars" id="poolStars"><div class="icon">⭐</div><div class="name">收藏</div><div class="desc">已收藏词组</div></div>
    </div>
    <div class="flashcard-wrap">
      <div style="width:100%; display:flex; justify-content:space-between; align-items:center">
        <span class="fc-counter" id="fcCounter">0 / 0</span>
        <button onclick="shuffleFlash()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px">🔀 随机</button>
      </div>
      <div class="fc-progress"><div class="fc-progress-bar" id="fcBar" style="width:0%"></div></div>
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div id="fcFront">
          <div class="fc-tag" id="fcTag"></div>
          <div class="fc-phrase" id="fcPhrase">点击开始</div>
          <div class="fc-hint" style="margin-top:20px; color:var(--muted); font-size:13px">👆 点击翻转查看释义与例句</div>
        </div>
        <div id="fcBack" class="fc-back">
          <div class="fc-cn" id="fcCn"></div>
          <div class="fc-example" id="fcEx"></div>
          <div class="fc-note" id="fcNote"></div>
        </div>
      </div>
      <div class="flip-hint" id="flipHint">点击卡片翻转</div>
      <div class="fc-actions" id="fcActions" style="display:none">
        <button class="fc-btn again" onclick="rateCard('again')">❌ 再来</button>
        <button class="fc-btn hard" onclick="rateCard('hard')">😓 困难</button>
        <button class="fc-btn good" onclick="rateCard('good')">✅ 掌握</button>
        <button class="fc-btn easy" onclick="rateCard('easy')">🚀 熟练</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="tab-quiz" style="display:none">
    <div class="topic-filter" id="quizTopicFilter"></div>
    <div id="quizArea"></div>
  </section>

  <!-- FILL -->
  <section id="tab-fill" style="display:none">
    <div class="topic-filter" id="fillTopicFilter"></div>
    <div id="fillArea"></div>
  </section>

  <!-- STARS -->
  <section id="tab-stars" style="display:none">
    <div class="section-title">⭐ 我的收藏</div>
    <div id="starList"></div>
  </section>
</main>

<script>
// ═══════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════
const DATA = [
  // 小作文
  {id:0,topic:"小作文",en:"see / experience / show an upward trend",cn:"呈上升趋势",ex:"The cost of insurance saw an upward trend, growing from only 2% in 1999 to 8% in 2001.",note:"同义替换：show a downward trend（呈下降趋势）；growing为现在分词作伴随状语。"},
  {id:1,topic:"小作文",en:"There be a marked increase in the figure for ...",cn:"…的数值有显著增长",ex:"There was a marked increase in the figure for mobile calls, from 2 billion to 46 billion minutes.",note:"修饰词替换：marked / significant / dramatic；固定搭配 the figure for + 统计对象。"},
  {id:2,topic:"小作文",en:"show a different pattern",cn:"呈现不同趋势",ex:"Sweden and Denmark showed a different pattern, with falls in banana sales from 1.8-1 and 2-0.9 million euros.",note:"fall 此处作可数名词，表示「数量减少」，图表高频名词用法。"},
  {id:3,topic:"小作文",en:"cluster between A and B",cn:"在 A、B 数值间波动",ex:"The figure for Britain clustered between 70% and 80%.",note:"同义替换：fluctuated between 70% and 80%。"},
  {id:4,topic:"小作文",en:"albeit to widely varying degrees",cn:"尽管增长幅度各不相同",ex:"The first table shows low-level coffee sales increasing in all five countries, albeit to widely varying degrees.",note:"albeit 连词，表「虽然」，后可接形容词、介词短语，提升句式高级度。"},
  {id:5,topic:"小作文",en:"reach the bottom at [数值]",cn:"达到最低点",ex:"The number plummeted, reaching the bottom at 100 in 2000.",note:"plummet 表示「暴跌」；同义：reach the lowest point；at 后直接接数字。"},
  {id:6,topic:"小作文",en:"record drops in ...",cn:"在……方面出现下降",ex:"By 2014, sales figure for both products had risen, except for Ireland and Belgium which recorded drops in apple sales.",note:"except for / apart from 除……之外；by + 年份主句使用完成时态。"},
  {id:7,topic:"小作文",en:"fall back to",cn:"回落到……",ex:"The figure for the visits had fallen back to the 1980 figure at the end of the period in question.",note:"反向搭配 increase back to（回升到）；at the end of the period in question 可替代图表末尾时间。"},
  {id:8,topic:"小作文",en:"double the percentage / number from ... to ...",cn:"数值翻倍",ex:"Over the past decade, nuclear power doubled its percentage from 5% to 10%.",note:"double 可作动词；也可作限定词：The figure for China was double the figure for Canada."},
  {id:9,topic:"小作文",en:"the trend favoured ...",cn:"趋势更偏向……",ex:"Older people were generally less likely to be poor, though the trend favoured elderly couple (only 4%) rather than single elder people (6%).",note:"favour 此处表「偏向、青睐」；though/although 引导让步从句。"},
  {id:10,topic:"小作文",en:"compared to ...",cn:"与……相比",ex:"The proportion of land degradation in American was the highest in 2005, at 80%, compared to around 56% in other countries.",note:"compared to 为过去分词作状语，图表对比万能句式。"},
  {id:11,topic:"小作文",en:"It takes ... to do sth.",cn:"花费……时间做某事（流程图专用）",ex:"Eggs are produced by a moth, and it takes around ten days to become a silkworm lava that feeds on mulberry leaf.",note:"流程图描述时间专用句型，不可用 cost 表达耗时。"},
  // 政府
  {id:12,topic:"政府",en:"vulnerable displaced people",cn:"弱势群体难民",ex:"International funds can be used to provide vital assistance to a large number of vulnerable displaced people and save them from starvation and poverty.",note:"固定搭配 provide sb. with sth. / provide sth. to sb.；save sb. from sth. 使某人免于……"},
  {id:13,topic:"政府",en:"reduce the gap",cn:"缩小差距",ex:"There are many reasons why the living standards in rural and urban areas differ so much in developing countries and the government has a range of responsibilities for reducing the gap.",note:"同义替换 narrow/bridge the gap between rich and poor；There be + 定语从句高分句型。"},
  {id:14,topic:"政府",en:"place reasonable controls on",cn:"对……实施合理管控",ex:"The responsibility finally rests with government to place reasonable controls on the real estate market.",note:"rest with sb. to do sth. ……是某人的责任；real estate 房地产。"},
  {id:15,topic:"政府",en:"shoulder the responsibility to do sth.",cn:"承担做某事的责任",ex:"Governments should shoulder the responsibility to plan, build and maintain city infrastructure.",note:"maintain 侧重长期维护保养；keep 仅表维持原有状态。"},
  {id:16,topic:"政府",en:"use limited resources",cn:"利用有限资源",ex:"Every government faces a dilemma: how should it use its limited resources in the best way.",note:"face a dilemma 面临两难困境，政府话题高频短语。"},
  {id:17,topic:"政府",en:"strike a balance between A and B",cn:"在 AB 之间达成平衡",ex:"There is no denying that each country must strike a balance between dealing with international and domestic threats.",note:"同义 achieve a balance between work and life；domestic 国内的、家庭的。"},
  {id:18,topic:"政府",en:"impose a burden on",cn:"给……造成负担",ex:"If the government provides free access to education, this will not only impose a burden on the country, but also have a negative effect on state funding for other sectors.",note:"place a burden on 同义替换；free access to 免费获取……"},
  {id:19,topic:"政府",en:"an important source of government revenue",cn:"政府财政收入重要来源",ex:"Taxes paid by individual citizens are an important source of government revenue.",note:"revenue 不可数，复数 revenues 表年度总收入；注意主谓一致。"},
  {id:20,topic:"政府",en:"be profit driven",cn:"受利益驱动",ex:"Private companies are profit driven, which often makes them more motivated and goal-oriented in their projects than governments departments and agencies.",note:"复合词拓展：market-driven economy 市场导向经济；goal-oriented 目标导向。"},
  {id:21,topic:"政府",en:"material success",cn:"物质层面的成就",ex:"I believe that art programmes should still receive government funding to keep the progress of society balanced between achieving material success and expressing itself beautifully and creatively.",note:"receive government funding 获得政府财政拨款；keep sth.+adj. 保持某物某种状态。"},
  {id:22,topic:"政府",en:"infrastructure development",cn:"基础设施发展",ex:"Government funds for some other fields, including infrastructure development and health care, also lead to significant improvements in people's lives.",note:"fund 作动词：为……提供资金；improvement 可数表具体改善，不可数表抽象改善。"},
  {id:23,topic:"政府",en:"long waiting lists for ...",cn:"长时间排队等候",ex:"The privately insured are entitled to special benefits such as having the choice of their own doctors, and being able to avoid long waiting lists for hospital beds.",note:"the + adj. 指代一类人 the insured 参保人群；be entitled to 有权享有……"},
  // 教育
  {id:24,topic:"教育",en:"increase cultural experiences",cn:"丰富文化体验",ex:"Travelling overseas allows young adults to have mind-broadening experiences and increase their cultural experiences.",note:"allow sb. to do sth. 使某人能够做某事；动名词作主语谓语用单数。"},
  {id:25,topic:"教育",en:"cope with the challenges",cn:"应对挑战",ex:"Those who live in a boarding school environment tend to be more independent and can cope with the challenges of life better.",note:"tend to do 往往、倾向于；challenges 比 difficulty 写作更高级。"},
  {id:26,topic:"教育",en:"without academic qualifications",cn:"无大学文凭",ex:"For those without academic qualifications, it is rather difficult to find a decent job.",note:"It is + adj. for sb. to do 万能评价句型；可数名词不能单独裸奔。"},
  {id:27,topic:"教育",en:"academic endeavours",cn:"学业、学术钻研",ex:"Students need to be involved in certain school activities, but not to allow them to become a distraction from academic endeavors.",note:"be involved in 参与；distraction 使人分心的事物。"},
  {id:28,topic:"教育",en:"increase one's employability",cn:"提升就业竞争力",ex:"Hands-on experience acquired through community service will not only be an asset on their CV, but also increase their employability.",note:"过去分词 acquired 作后置定语；not only...but also 前后语法成分一致。"},
  {id:29,topic:"教育",en:"stand out from the masses of other applicants",cn:"在求职者中脱颖而出",ex:"If university students make the most of the college life and gain extra experience, they are more likely to stand out from the masses of other applicants after graduation.",note:"make the most of 充分利用；be more likely to do 很可能做某事。"},

  {id:31,topic:"教育",en:"improve one's physical conditions",cn:"增强身体素质",ex:"Engaging in physical activities can improve students' physical conditions as well as boosting their confidence.",note:"boost one's confidence 增强自信；as well as 后接动名词。"},
  {id:32,topic:"教育",en:"absorb concepts at one's own pace",cn:"按自身节奏吸收知识",ex:"One of the biggest advantages of distance learning is its flexibility, which enables learners to absorb concepts at their own pace.",note:"flexibility 灵活性（不可数）；enable sb. to do 使某人能够。"},
  {id:33,topic:"教育",en:"develop into well-rounded and capable adults",cn:"成长为全面发展的成年人",ex:"College should also provide young adults with various extracurricular activities to help them develop into well-rounded and capable adults.",note:"provide sb. with sth. 提供某物给某人；develop into 成长为。"},
  {id:34,topic:"教育",en:"reduce distractions and concentrate on studies",cn:"减少干扰、专注学习",ex:"Some educationalists argue that single-sex schools can reduce distractions and encourage students to concentrate on their studies.",note:"It is + adj. to do 标准不定式评价句式。"},

  {id:36,topic:"教育",en:"develop the culture of cooperation",cn:"培养合作意识",ex:"PE classes can develop a culture of cooperation among teenagers, as they are required to collaborate with each other in sports matches.",note:"collaborate 不及物动词，表示协作；be required to do 被动语态。"},
  {id:37,topic:"教育",en:"adapt to an academic environment",cn:"适应校园学习环境",ex:"Young people may find it rather difficult to adapt to an academic environment again when they return to school.",note:"find it + adj. to do 高频万能句型；readapt to 重新适应。"},
  {id:38,topic:"教育",en:"gain a clear perspective of",cn:"对……形成清晰认知",ex:"Students are able to gain a clear perspective of some important virtues such as honesty and politeness through moral education.",note:"virtue 可数表各类美德，不可数泛指高尚品德。"},
  {id:39,topic:"教育",en:"social exposure",cn:"社会阅历、社会接触",ex:"Restricted by general knowledge and social exposure, teenagers cannot distinguish right from wrong and are likely to be led to a blind alley.",note:"distinguish right from wrong 明辨是非；be led to a blind alley 误入歧途。"},

  {id:42,topic:"教育",en:"from low socio-economic status",cn:"出身贫寒",ex:"Governments should ensure that everyone has equal access to education, thereby helping break the cycle of poverty, a common problem found among those from low socio-economic status.",note:"thereby doing 作结果状语；break the cycle of poverty 摆脱贫困循环。"},

// ── UTIL ──
function save() {
  localStorage.setItem('ielts_stars', JSON.stringify(stars));
  localStorage.setItem('ielts_ratings', JSON.stringify(ratings));
  localStorage.setItem('ielts_stats', JSON.stringify(quizStats));
  localStorage.setItem('ielts_learned', JSON.stringify(learnedSet));
  updateHeaderStats();
}
function updateHeaderStats() {
  document.getElementById('learnedCount').textContent = learnedSet.length;
  document.getElementById('starCount').textContent = stars.length;
  const pct = quizStats.total ? Math.round(quizStats.correct/quizStats.total*100)+'%' : '—';
  document.getElementById('accuracyPct').textContent = pct;
}
function getFiltered(topic) {
  if (topic === '全部') return DATA;
  return DATA.filter(d => d.topic === topic);
}
function shuffle(arr) {
  const a = [...arr]; for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}
function highlight(text, phrase) {
  const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\.\.\./g,'.*?');
  return text;
}

  const el = document.getElementById(containerId);
  el.innerHTML = TOPICS.map(t =>
    `<span class="chip${t===activeVal?' active':''}" onclick="(${onChange.toString()})('${t}')">${t}</span>`
  ).join('');
}

// ══════════════════════════════
//  BROWSE
// ══════════════════════════════
function renderBrowse() {
  buildFilter('topicFilter', browseTopic, t => { browseTopic=t; renderBrowse(); });
  const items = getFiltered(browseTopic);
  document.getElementById('browseList').innerHTML = items.map(d => `
    <div class="phrase-card">
      <div class="phrase-header">
        <div>
          <div class="tag" style="color:${TOPIC_COLORS[d.topic]||'var(--accent)'}">● ${d.topic}</div>
          <div class="phrase-en">${d.en}</div>
          <div class="phrase-cn">${d.cn}</div>
        </div>
        <button class="star-btn" onclick="toggleStar(${d.id}, this)" title="收藏">${stars.includes(d.id)?'⭐':'☆'}</button>
      </div>
      <button class="example-toggle" onclick="toggleEx(this)">▶ 查看例句与讲解</button>
      <div class="example-box">
        <div class="example-en">${d.ex}</div>
        <div class="example-note">💡 ${d.note}</div>
      </div>
    </div>
  `).join('');
}
function toggleEx(btn) {
  const box = btn.nextElementSibling;
  const open = box.classList.toggle('open');
  btn.textContent = open ? '▼ 收起' : '▶ 查看例句与讲解';
}
function toggleStar(id, btn) {
  if (stars.includes(id)) { stars=stars.filter(s=>s!==id); btn.textContent='☆'; }
  else { stars.push(id); btn.textContent='⭐'; }
  save(); renderStars();
}

// ══════════════════════════════
//  FLASHCARD
// ══════════════════════════════
function buildFlashDeck() {
  let base = getFiltered(flashTopic);
  if (flashPool === 'weak') base = base.filter(d => ratings[d.id]==='again'||ratings[d.id]==='hard');
  else if (flashPool === 'stars') base = base.filter(d => stars.includes(d.id));
  flashDeck = shuffle(base);
  flashIdx = 0; flashFlipped = false;
  renderFlashCard();
}
function renderFlashCard() {
  const total = flashDeck.length;
  document.getElementById('fcCounter').textContent = total ? `${flashIdx+1} / ${total}` : '0 / 0';
  document.getElementById('fcBar').style.width = total ? ((flashIdx)/total*100)+'%' : '0%';
  if (!total) {
    document.getElementById('fcPhrase').textContent = '暂无卡片';
    document.getElementById('fcTag').textContent = '';
    document.getElementById('fcBack').style.display='none';
    document.getElementById('fcFront').style.display='block';
    document.getElementById('fcActions').style.display='none';
    document.getElementById('flipHint').style.display='block';
    return;
  }
  const d = flashDeck[flashIdx];
  document.getElementById('fcTag').textContent = `● ${d.topic}`;
  document.getElementById('fcTag').style.color = TOPIC_COLORS[d.topic]||'var(--accent)';
  document.getElementById('fcPhrase').textContent = d.en;
  document.getElementById('fcCn').textContent = d.cn;
  document.getElementById('fcEx').textContent = d.ex;
  document.getElementById('fcNote').textContent = '💡 '+d.note;
  showFront();
  if (!learnedSet.includes(d.id)) { learnedSet.push(d.id); save(); }
}
function showFront() {
  flashFlipped=false;
  document.getElementById('fcFront').style.display='block';
  document.getElementById('fcBack').style.display='none';
  document.getElementById('fcActions').style.display='none';
  document.getElementById('flipHint').style.display='block';
}
function flipCard() {
  if (!flashDeck.length) return;
  if (!flashFlipped) {
    flashFlipped=true;
    document.getElementById('fcFront').style.display='none';
    document.getElementById('fcBack').style.display='block';
    document.getElementById('fcBack').classList.add('visible');
    document.getElementById('fcActions').style.display='flex';
    document.getElementById('flipHint').style.display='none';
  }
}
function rateCard(rating) {
  if (!flashDeck.length) return;
  const d = flashDeck[flashIdx];
  ratings[d.id] = rating;
  save();
  flashIdx++;
  if (flashIdx >= flashDeck.length) {
    showFlashComplete();
  } else {
    flashFlipped=false;
    renderFlashCard();
  }
}
function showFlashComplete() {
  document.getElementById('flashcard').innerHTML = `
    <div style="text-align:center; padding:20px">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <div style="font-size:22px;font-weight:700;margin-bottom:8px">本轮完成！</div>
      <div style="color:var(--muted);margin-bottom:24px">共复习 ${flashDeck.length} 张卡片</div>
      <button onclick="buildFlashDeck()" style="padding:12px 28px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer">再来一轮 🔄</button>
    </div>`;
  document.getElementById('fcActions').style.display='none';
  document.getElementById('flipHint').style.display='none';
}
function shuffleFlash() { buildFlashDeck(); }

// ══════════════════════════════
//  QUIZ (multiple choice)
// ══════════════════════════════
function startQuiz() {
  let base = shuffle(getFiltered(quizTopic));
  if (base.length < 4) { document.getElementById('quizArea').innerHTML = '<div class="empty">该话题词组太少，请切换到"全部"</div>'; return; }
  quizItems = base.slice(0, Math.min(base.length, 15));
  quizCurrent = 0;
  renderQuiz();
}
function renderQuiz() {
  if (quizCurrent >= quizItems.length) { showQuizResults(); return; }
  const d = quizItems[quizCurrent];
  // pick 3 wrong answers
  const others = shuffle(DATA.filter(x=>x.id!==d.id)).slice(0,3);
  const choices = shuffle([d, ...others]);

  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span class="tag" style="color:${TOPIC_COLORS[d.topic]||'var(--accent)'}">● ${d.topic}</span>
        <span style="font-size:13px;color:var(--muted)">${quizCurrent+1} / ${quizItems.length}</span>
      </div>
      <div class="fc-progress"><div class="fc-progress-bar" style="width:${(quizCurrent/quizItems.length*100)}%"></div></div>
      <div class="quiz-q">
        <div class="quiz-label">选出下列短语对应的中文含义</div>
        <div class="quiz-sentence">${d.en}</div>
        <div class="quiz-choices">
          ${choices.map((c,i) => `<button class="choice-btn" id="choice${i}" onclick="selectChoice(${c.id},${d.id},${i})">${c.cn}</button>`).join('')}
        </div>
        <div class="quiz-feedback" id="qFeedback"></div>
      </div>
      <button class="next-btn" id="qNext" onclick="nextQuiz()">下一题 →</button>
    </div>`;
}
function selectChoice(chosen, correct, idx) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled=true);
  const fb = document.getElementById('qFeedback');
  if (chosen === correct) {
    document.getElementById('choice'+idx).classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.innerHTML = '✅ 正确！' + DATA.find(d=>d.id===correct).note;
    quizStats.correct++; quizStats.total++;
  } else {
    document.getElementById('choice'+idx).classList.add('wrong');
    // find and highlight correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent.trim() === DATA.find(d=>d.id===correct).cn) b.classList.add('correct');
    });
    fb.className = 'quiz-feedback show no';
    fb.innerHTML = '❌ 答案是：<b>' + DATA.find(d=>d.id===correct).cn + '</b><br>' + DATA.find(d=>d.id===correct).note;
    quizStats.total++;
    ratings[correct] = 'again';
  }
  save();
  document.getElementById('qNext').classList.add('show');
}
function nextQuiz() { quizCurrent++; renderQuiz(); }
function showQuizResults() {
  const score = quizStats.correct;
  const total = quizItems.length;
  // recount for this session
  const msg = score/total >= .8 ? '🎉 非常棒！' : score/total >= .5 ? '👍 继续加油！' : '📚 多多复习吧！';
  document.getElementById('quizArea').innerHTML = `
    <div class="results-box">
      <div class="results-score">${quizStats.correct}</div>
      <div class="results-pct">累计答对 / 共 ${quizStats.total} 题 · 正确率 ${Math.round(quizStats.correct/quizStats.total*100)}%</div>
      <div class="results-msg">${msg}</div>
      <button class="retry-btn" onclick="startQuiz()">再练一组 🔄</button>
    </div>`;
  updateHeaderStats();
}

// ══════════════════════════════
//  FILL IN THE BLANK
// ══════════════════════════════
function startFill() {
  let base = shuffle(getFiltered(fillTopic));
  if (!base.length) { document.getElementById('fillArea').innerHTML = '<div class="empty">暂无内容</div>'; return; }
  fillItems = base.slice(0,12);
  fillCurrent = 0;
  renderFill();
}
function renderFill() {
  if (fillCurrent >= fillItems.length) { showFillResults(); return; }
  const d = fillItems[fillCurrent];
  // blank out the phrase in example sentence
  const blanked = d.ex.replace(d.en.split('/')[0].trim().split(' ')[0], '______');
  document.getElementById('fillArea').innerHTML = `
    <div class="quiz-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span class="tag" style="color:${TOPIC_COLORS[d.topic]||'var(--accent)'}">● ${d.topic}</span>
        <span style="font-size:13px;color:var(--muted)">${fillCurrent+1} / ${fillItems.length}</span>
      </div>
      <div class="fc-progress"><div class="fc-progress-bar" style="width:${(fillCurrent/fillItems.length*100)}%"></div></div>
      <div class="quiz-q">
        <div class="quiz-label">🇨🇳 看中文写出对应英文搭配</div>
        <div class="quiz-sentence" style="font-size:22px;font-weight:700;color:#c9c4ff;text-align:center">${d.cn}</div>
        <input class="fill-input" id="fillInput" placeholder="输入英文搭配..." autocomplete="off" onkeydown="if(event.key==='Enter')checkFill()">
        <div style="display:flex;gap:10px;align-items:center">
          <button class="submit-btn" onclick="checkFill()">提交</button>
          <button onclick="showFillHint()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:12px 0">💡 提示</button>
        </div>
        <div class="quiz-feedback" id="fillFeedback"></div>
      </div>
      <button class="next-btn" id="fillNext" onclick="nextFill()">下一题 →</button>
    </div>`;
  document.getElementById('fillInput').focus();
}
function showFillHint() {
  const d = fillItems[fillCurrent];
  const hint = d.en.split(' ').map((w,i)=>i===0?w[0]+'___':w).join(' ');
  const fb = document.getElementById('fillFeedback');
  fb.className='quiz-feedback show';
  fb.style.background='#1a1e3a'; fb.style.color='var(--accent)';
  fb.innerHTML='💡 提示：<b>'+hint+'</b>';
}
function checkFill() {
  const d = fillItems[fillCurrent];
  const input = document.getElementById('fillInput').value.trim().toLowerCase();
  const correct = d.en.toLowerCase();
  const fb = document.getElementById('fillFeedback');
  document.getElementById('fillInput').disabled = true;
  document.querySelector('.submit-btn').disabled = true;
  const isCorrect = correct.includes(input) && input.length > 3;
  if (isCorrect) {
    fb.className='quiz-feedback show ok';
    fb.innerHTML='✅ 正确！<br><b>'+d.en+'</b>';
    quizStats.correct++; quizStats.total++;
  } else {
    fb.className='quiz-feedback show no';
    fb.innerHTML='❌ 正确答案：<br><b>'+d.en+'</b><br><span style="font-size:12px;margin-top:6px;display:block">例句：'+d.ex+'</span>';
    quizStats.total++;
    ratings[d.id]='again';
  }
  save();
  document.getElementById('fillNext').classList.add('show');
}
function nextFill() { fillCurrent++; renderFill(); }
function showFillResults() {
  document.getElementById('fillArea').innerHTML = `
    <div class="results-box">
      <div style="font-size:48px;margin-bottom:12px">✏️</div>
      <div class="results-score">${quizStats.correct}</div>
      <div class="results-pct">累计得分 / ${quizStats.total} 题</div>
      <button class="retry-btn" onclick="startFill()">再来一组 🔄</button>
    </div>`;
}

// ══════════════════════════════
//  STARS
// ══════════════════════════════
function renderStars() {
  const items = DATA.filter(d => stars.includes(d.id));
  if (!items.length) { document.getElementById('starList').innerHTML='<div class="empty">还没有收藏的词组<br>在浏览页面点击 ☆ 来收藏！</div>'; return; }
  document.getElementById('starList').innerHTML = items.map(d => `
    <div class="phrase-card">
      <div class="phrase-header">
        <div>
          <div class="tag" style="color:${TOPIC_COLORS[d.topic]||'var(--accent)'}">● ${d.topic}</div>
          <div class="phrase-en">${d.en}</div>
          <div class="phrase-cn">${d.cn}</div>
        </div>
        <button class="star-btn" onclick="removeStar(${d.id})" title="取消收藏">⭐</button>
      </div>
      <div class="example-box open">
        <div class="example-en">${d.ex}</div>
        <div class="example-note">💡 ${d.note}</div>
      </div>
    </div>
  `).join('');
}
function removeStar(id) {
  stars = stars.filter(s=>s!==id);
  save(); renderStars(); renderBrowse();
}

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    ['browse','flash','quiz','fill','stars'].forEach(t => {
      document.getElementById('tab-'+t).style.display = t===currentTab ? 'block' : 'none';
    });
    if (currentTab==='flash') {
      buildFilter('flashFilter', flashTopic, t => { flashTopic=t; buildFlashDeck(); });
      buildFlashDeck();
    }
    if (currentTab==='quiz') {
      buildFilter('quizTopicFilter', quizTopic, t => { quizTopic=t; startQuiz(); });
      startQuiz();
    }
    if (currentTab==='fill') {
      buildFilter('fillTopicFilter', fillTopic, t => { fillTopic=t; startFill(); });
      startFill();
    }
    if (currentTab==='stars') renderStars();
  });
});

// Pool buttons
document.querySelectorAll('[data-pool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-pool]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    flashPool = btn.dataset.pool;
    buildFlashDeck();
  });
});

// ── INIT ──
renderBrowse();
updateHeaderStats();
</script>
</body>
</html>
