<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>睡眠EBP · 21天完整手册</title>
<style>
  :root {
    --blue-50: #E8F0FE;
    --blue-100: #C5D8FD;
    --blue-200: #8AB4FB;
    --blue-400: #4A86E8;
    --blue-600: #2A60C5;
    --blue-800: #1A3E8F;
    --indigo-50: #EEF0FE;
    --indigo-200: #ABAEF0;
    --indigo-400: #7276DC;
    --indigo-600: #4447B5;
    --amber-50: #FFF8E8;
    --amber-200: #F6CC6E;
    --amber-400: #E6A817;
    --amber-600: #B07C0A;
    --gray-50: #F6F7FA;
    --gray-100: #ECEEF4;
    --gray-200: #D1D4E0;
    --gray-400: #888BA0;
    --gray-600: #5E6070;
    --gray-900: #1A1B25;
    --text-primary: #1A1B25;
    --text-secondary: #5E6070;
    --text-muted: #888BA0;
    --surface-0: #F6F7FA;
    --surface-1: #ECEEF4;
    --surface-2: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --blue-50: #0D1E3D;
      --blue-100: #1A3E8F;
      --blue-200: #2A60C5;
      --blue-400: #4A86E8;
      --blue-600: #8AB4FB;
      --blue-800: #C5D8FD;
      --indigo-50: #1A1B45;
      --indigo-200: #4447B5;
      --indigo-400: #7276DC;
      --indigo-600: #ABAEF0;
      --amber-50: #2E2200;
      --amber-200: #7A5000;
      --amber-400: #E6A817;
      --amber-600: #F6CC6E;
      --gray-50: #1A1B25;
      --gray-100: #242535;
      --gray-200: #383A50;
      --gray-400: #888BA0;
      --gray-600: #B4B6C8;
      --gray-900: #F6F7FA;
      --text-primary: #EEF0F8;
      --text-secondary: #B4B6C8;
      --text-muted: #888BA0;
      --surface-0: #12131C;
      --surface-1: #1A1B25;
      --surface-2: #242535;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.14);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: var(--surface-0);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.7;
  }

  .header {
    background: var(--surface-2);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .header-left { display: flex; align-items: center; gap: 0.75rem; }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--blue-400);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px;
    flex-shrink: 0;
  }

  .header-titles { display: flex; flex-direction: column; }
  .header-title { font-size: 15px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em; }
  .header-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }

  .progress-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
  .progress-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .progress-track { width: 100px; height: 4px; background: var(--surface-1); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue-400); border-radius: 2px; transition: width 0.4s ease; }

  .io-btns { display: flex; gap: 0.4rem; }
  .io-btn {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.35rem 0.65rem;
    border-radius: var(--radius);
    font-size: 12px; font-weight: 500;
    cursor: pointer; border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text-secondary);
    transition: all 0.15s; white-space: nowrap;
  }
  .io-btn:hover { background: var(--surface-1); color: var(--text-primary); }
  .io-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .io-btn.export { border-color: var(--blue-400); color: var(--blue-600); }
  .io-btn.export:hover { background: var(--blue-50); }

  .layout {
    display: grid;
    grid-template-columns: 272px 1fr;
    min-height: calc(100vh - 61px);
  }

  .sidebar {
    background: var(--surface-2);
    border-right: 0.5px solid var(--border);
    overflow-y: auto;
    position: sticky;
    top: 61px;
    height: calc(100vh - 61px);
    padding: 0.75rem 0;
  }

  .sidebar-section-title {
    font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 0.75rem 1.25rem 0.375rem;
  }

  .day-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.45rem 1.25rem;
    cursor: pointer; transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .day-item:hover { background: var(--surface-0); }
  .day-item.active { background: var(--blue-50); border-left-color: var(--blue-400); }
  .day-item.completed .day-num { background: var(--blue-400); color: white; border-color: var(--blue-400); }

  .day-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    color: var(--text-secondary);
    flex-shrink: 0; transition: all 0.15s;
  }
  .day-item.active .day-num { background: var(--blue-400); color: white; border-color: var(--blue-400); }

  .day-text { flex: 1; min-width: 0; }
  .day-title {
    font-size: 12px; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .day-item.active .day-title { color: var(--blue-600); font-weight: 500; }
  .day-tag { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  .day-badges { display: flex; gap: 3px; flex-shrink: 0; }
  .day-badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gray-200);
  }
  .day-badge-dot.has-write { background: var(--indigo-400); }

  .main { padding: 2rem 2.5rem; max-width: 780px; }

  .tabs {
    display: flex; gap: 0; margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.6rem 1.25rem;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active { color: var(--blue-400); border-bottom-color: var(--blue-400); }
  .tab-btn svg { width: 14px; height: 14px; }

  .day-header { margin-bottom: 1.5rem; }
  .day-badge-pill {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--blue-50); color: var(--blue-600);
    font-size: 11px; font-weight: 500;
    padding: 0.2rem 0.65rem; border-radius: 100px;
    margin-bottom: 0.6rem;
    border: 0.5px solid rgba(74,134,232,0.2);
  }
  .day-header h2 {
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em; color: var(--text-primary);
    line-height: 1.3; margin-bottom: 0.4rem;
  }
  .day-meta { font-size: 13px; color: var(--text-muted); }

  .card {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--blue-400); margin-bottom: 0.75rem;
  }
  .card-label.amber { color: var(--amber-600); }
  .card-label.indigo { color: var(--indigo-400); }

  .player-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
  .player-icon {
    width: 44px; height: 44px;
    background: var(--blue-50); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .player-icon svg { width: 22px; height: 22px; color: var(--blue-400); }
  .player-info { flex: 1; }
  .player-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .player-hint { font-size: 12px; color: var(--text-muted); }
  audio { width: 100%; height: 38px; border-radius: var(--radius); outline: none; }
  audio::-webkit-media-controls-panel { background: var(--surface-1); border-radius: var(--radius); }

  .action-row { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.45rem 0.9rem;
    border-radius: var(--radius); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text-secondary);
    text-decoration: none;
  }
  .btn:hover { background: var(--surface-1); color: var(--text-primary); }
  .btn svg { width: 13px; height: 13px; }

  .content-text { font-size: 14px; color: var(--text-primary); line-height: 1.85; }
  .content-text p { margin-bottom: 0.8rem; }
  .content-text p:last-child { margin-bottom: 0; }

  .tips-box {
    background: var(--indigo-50);
    border: 0.5px solid rgba(114,118,220,0.2);
    border-radius: var(--radius);
    padding: 0.875rem 1.1rem; margin-top: 1rem;
  }
  .tips-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--indigo-400); margin-bottom: 0.35rem; }
  .tips-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

  .read-section { margin-bottom: 1.5rem; }
  .read-section h3 {
    font-size: 16px; font-weight: 500; color: var(--text-primary);
    margin-bottom: 0.75rem; padding-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .read-section h4 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 1rem 0 0.4rem; }
  .read-section h5 { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin: 0.75rem 0 0.3rem; }
  .read-section p { font-size: 14px; color: var(--text-primary); line-height: 1.85; margin-bottom: 0.6rem; }
  .read-section ol, .read-section ul { font-size: 14px; color: var(--text-primary); line-height: 1.8; padding-left: 1.4rem; margin-bottom: 0.6rem; }
  .read-section li { margin-bottom: 0.2rem; }
  .read-section strong { color: var(--text-primary); }
  .read-section table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 0.8rem; }
  .read-section th, .read-section td { border: 0.5px solid var(--border-strong); padding: 0.5rem 0.75rem; text-align: left; }
  .read-section th { background: var(--surface-1); font-weight: 600; }

  .read-overview {
    background: var(--blue-50);
    border: 0.5px solid rgba(74,134,232,0.2);
    border-radius: var(--radius);
    padding: 0.875rem 1.1rem;
    margin-bottom: 1rem;
  }
  .read-overview-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--blue-600); margin-bottom: 0.4rem; }
  .read-overview ol { font-size: 13px; color: var(--text-secondary); padding-left: 1.2rem; }

  .template-box {
    background: var(--amber-50);
    border: 0.5px solid rgba(230,168,23,0.25);
    border-radius: var(--radius);
    padding: 0.875rem 1.1rem;
    margin-bottom: 1rem;
  }
  .template-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--amber-600); margin-bottom: 0.4rem; }
  .template-text { font-size: 13px; color: var(--text-secondary); line-height: 1.75; white-space: pre-wrap; }

  .example-box {
    background: var(--surface-1);
    border-radius: var(--radius);
    padding: 0.875rem 1.1rem;
    margin-bottom: 0.5rem;
  }
  .example-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.4rem; }
  .example-text { font-size: 13px; color: var(--text-secondary); line-height: 1.75; }

  .write-field { margin-bottom: 1rem; }
  .write-field label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 0.35rem;
  }
  .write-field textarea {
    width: 100%; min-height: 72px;
    background: var(--surface-0);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 0.65rem 0.875rem;
    font-size: 14px; color: var(--text-primary);
    font-family: inherit; line-height: 1.7;
    resize: vertical; transition: border-color 0.15s;
  }
  .write-field textarea:focus { outline: none; border-color: var(--blue-400); }
  .write-field textarea::placeholder { color: var(--text-muted); }

  .write-guide {
    background: var(--amber-50);
    border: 0.5px solid rgba(230,168,23,0.25);
    border-radius: var(--radius);
    padding: 0.875rem 1.1rem; margin-bottom: 1rem;
    font-size: 13px; color: var(--text-secondary); line-height: 1.75;
  }
  .write-guide strong { color: var(--amber-600); }

  .save-indicator {
    font-size: 11px; color: var(--blue-400);
    opacity: 0; transition: opacity 0.3s;
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .save-indicator.show { opacity: 1; }

  .calendar-strip { display: flex; gap: 3px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .cal-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--surface-1); border: 0.5px solid var(--border-strong);
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .cal-dot.done { background: var(--blue-400); border-color: var(--blue-400); }
  .cal-dot.current { background: var(--indigo-400); border-color: var(--indigo-400); }
  .cal-dot:hover { transform: scale(1.35); }

  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 2rem; padding-top: 1.25rem;
    border-top: 0.5px solid var(--border);
  }
  .nav-btn {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.55rem 1.1rem; border-radius: var(--radius);
    font-size: 13px; cursor: pointer;
    border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text-primary);
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface-1); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-btn svg { width: 15px; height: 15px; }

  .complete-btn { background: var(--blue-400); color: white; border-color: var(--blue-400); }
  .complete-btn:hover { background: var(--blue-600); border-color: var(--blue-600); }
  .complete-btn.done { background: var(--gray-200); color: var(--text-muted); border-color: var(--gray-200); }
  .complete-btn.done:hover { background: var(--gray-200); }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--gray-900); color: white;
    padding: 0.6rem 1.25rem; border-radius: 100px;
    font-size: 13px; opacity: 0; transition: all 0.25s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface-2); border-radius: 16px;
    padding: 2rem; max-width: 420px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: translateY(12px); transition: transform 0.2s;
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal h3 { font-size: 17px; font-weight: 500; margin-bottom: 0.5rem; }
  .modal p { font-size: 13px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 1.25rem; }
  .modal-btns { display: flex; gap: 0.75rem; justify-content: flex-end; }
  .modal-btn {
    padding: 0.5rem 1.1rem; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 0.5px solid var(--border-strong);
    background: transparent; color: var(--text-primary); transition: all 0.15s;
  }
  .modal-btn:hover { background: var(--surface-1); }
  .modal-btn.primary { background: var(--blue-400); color: white; border-color: var(--blue-400); }
  .modal-btn.primary:hover { background: var(--blue-600); border-color: var(--blue-600); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1rem 1.25rem; max-width: 100%; }
    .header { padding: 0.875rem 1.25rem; }
    .progress-bar-wrap { display: none; }
    .io-btns { gap: 0.3rem; }
    .io-btn span { display: none; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">🌙</div>
    <div class="header-titles">
      <div class="header-title">睡眠EBP · 21天完整手册</div>
      <div class="header-subtitle">循证睡眠改善计划 · 主讲：孙轶群</div>
    </div>
  </div>
  <div class="header-right">
    <div class="progress-bar-wrap">
      <span class="progress-label" id="progress-label">0 / 22 天</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="io-btns">
      <button class="io-btn export" onclick="exportData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>导出数据</span>
      </button>
      <button class="io-btn" onclick="triggerImport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>导入数据</span>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main-content"></main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h3>导入数据</h3>
    <p>导入将覆盖当前所有进度和书写内容。建议先导出备份当前数据，再进行导入。</p>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" id="confirm-import-btn">确认导入</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const BASE_URL = "https://github.com/liv-65/ielts-app/releases/download/v2.0/";

const DAYS = [
  { title: "我的初心与承诺", tag: "启程准备", audio: "00.mp3" },
  { title: "睡眠日记", tag: "基线记录", audio: "01.mp3" },
  { title: "压力与渐进式肌肉放松", tag: "躯体放松", audio: "02.mp3" },
  { title: "大脑杂念认知加工", tag: "认知觉察", audio: "03.mp3" },
  { title: "聆听睡眠的信号", tag: "破除误区", audio: "04.mp3" },
  { title: "减少睡眠努力", tag: "放下执念", audio: "05.mp3" },
  { title: "不完美也可以", tag: "睡眠卫生", audio: "06.mp3" },
  { title: "调控睡眠的两只手", tag: "睡眠动力", audio: "07.mp3" },
  { title: "了解你的睡眠", tag: "解读周报", audio: "08.mp3" },
  { title: "计算个人睡眠能力", tag: "时间表", audio: "09.mp3" },
  { title: "睡眠轻断食", tag: "短期痛苦换长期获益", audio: "10.mp3" },

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentDay = 0;
let currentTab = 'audio'; // 'audio' | 'content' | 'writing'
let completed = [];
let writingData = {};
let pendingImportData = null;

function loadData() {
  try {
    const stored = localStorage.getItem('sleep_ebp_v1');
    if (stored) {
      const d = JSON.parse(stored);
      completed = d.completed || [];
      writingData = d.writingData || {};
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem('sleep_ebp_v1', JSON.stringify({ completed, writingData }));
  } catch(e) {}
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportData() {
  const data = { version: 1, exportTime: new Date().toISOString(), completed, writingData };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `睡眠EBP数据_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function triggerImport() {
  document.getElementById('import-file').value = '';
  document.getElementById('import-file').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.completed || !data.writingData) throw new Error('格式不正确');
      pendingImportData = data;
      document.getElementById('confirm-import-btn').onclick = confirmImport;
      document.getElementById('import-modal').classList.add('show');
    } catch(err) {
      showToast('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
}

function confirmImport() {
  if (!pendingImportData) return;
  completed = pendingImportData.completed || [];
  writingData = pendingImportData.writingData || {};
  saveData();
  pendingImportData = null;
  closeModal();
  renderSidebar();
  renderMain();
  updateProgress();
  showToast('数据已成功导入');
}

function closeModal() {
  document.getElementById('import-modal').classList.remove('show');
}
document.getElementById('import-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  const sections = [
    { label: '启程', range: [0, 0] },
    { label: '第一周：了解睡眠·建立基线', range: [1, 7] },
    { label: '第二周：制定睡眠时间表', range: [8, 14] },
    { label: '第三周：刺激控制·接纳不完美', range: [15, 21] },
  ];
  sections.forEach(sec => {
    html += `<div class="sidebar-section-title">${sec.label}</div>`;
    for (let i = sec.range[0]; i <= sec.range[1]; i++) {
      const d = DAYS[i];
      const isActive = i === currentDay;
      const isDone = completed.includes(i);
      const hasWriteData = Object.keys(writingData).some(k => k.startsWith(`${i}-`));
      html += `<div class="day-item ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}" onclick="goDay(${i})">
        <div class="day-num">${isDone && !isActive ? '✓' : i}</div>
        <div class="day-text">
          <div class="day-title">${d.title}</div>
          <div class="day-tag">${d.tag}</div>
        </div>
        <div class="day-badges">
          ${hasWriteData ? `<div class="day-badge-dot has-write" title="有书写记录"></div>` : ''}
        </div>
      </div>`;
    }
  });
  sidebar.innerHTML = html;
}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function renderCalendar() {
  let html = '';
  for (let i = 0; i <= 21; i++) {
    const cls = i === currentDay ? 'current' : completed.includes(i) ? 'done' : '';
    html += `<div class="cal-dot ${cls}" title="第 ${i} 天" onclick="goDay(${i})"></div>`;
  }
  return html;
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  renderMain();
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────

        第 ${currentDay} 天 · ${day.tag}
      </div>
      <h2>${day.title}</h2>
      <div class="day-meta">主讲：孙轶群 · 语音练习 · 课程内容 · 书写练习</div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${currentTab === 'audio' ? 'active' : ''}" onclick="setTab('audio')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        语音练习
      </button>
      <button class="tab-btn ${currentTab === 'content' ? 'active' : ''}" onclick="setTab('content')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        课程内容
      </button>
      <button class="tab-btn ${currentTab === 'writing' ? 'active' : ''}" onclick="setTab('writing')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        书写练习
      </button>
    </div>

    ${tabContent}

    <div class="nav-row">
      <button class="nav-btn" onclick="goDay(${currentDay - 1})" ${currentDay === 0 ? 'disabled' : ''}>

        上一天
      </button>
      <button class="nav-btn complete-btn ${isDone ? 'done' : ''}" onclick="markDone(${currentDay})">
        ${isDone ? '✓ 已完成' : '标记为完成'}
      </button>
      <button class="nav-btn" onclick="goDay(${currentDay + 1})" ${currentDay === 21 ? 'disabled' : ''}>
        下一天
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>

// ─── WRITING TAB ─────────────────────────────────────────────────────────────
function renderWritingTab(dc) {
  let html = `
    <div class="card">
      <div class="card-label indigo">${dc.writeTitle}</div>
      ${dc.writeGuide ? `<div class="write-guide">${dc.writeGuide}</div>` : ''}
  `;

  dc.writeFields.forEach((field, fi) => {
    const key = `${currentDay}-f-${fi}`;
    const val = writingData[key] || '';
    html += `
      <div class="write-field">
        <label>${field.label}</label>
        <textarea data-key="${key}" placeholder="${field.placeholder || ''}" rows="3">${escapeHtml(val)}</textarea>
      </div>
    `;
  });

  html += `
      <div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.5rem;">
        <span class="save-indicator" id="save-indicator">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          已自动保存
        </span>
      </div>
    </div>
  `;
  return html;
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── TEXTAREA AUTO-SAVE ───────────────────────────────────────────────────────
let saveTimer = null;
document.addEventListener('input', (e) => {
  if (e.target.tagName === 'TEXTAREA' && e.target.dataset.key) {
    writingData[e.target.dataset.key] = e.target.value;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveData();
      renderSidebar();
      const ind = document.getElementById('save-indicator');
      if (ind) {
        ind.classList.add('show');
        setTimeout(() => ind.classList.remove('show'), 1800);
      }
    }, 600);
  }
});

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function goDay(n) {
  if (n < 0 || n > 21) return;
  currentDay = n;
  currentTab = 'audio';
  renderSidebar();
  renderMain();
  window.scrollTo(0, 0);
}

function markDone(n) {
  if (!completed.includes(n)) {
    completed.push(n);
    saveData();
    showToast(`第 ${n} 天已完成 🌙`);
  }
  renderSidebar();
  renderMain();
}

function updateProgress() {
  const pct = Math.round((completed.length / 22) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${completed.length} / 22 天`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
goDay(0);
</script>
