const PLAN_WEEK_STARTS = ['2026-07-06','2026-07-13','2026-07-20','2026-07-27','2026-08-03','2026-08-10','2026-08-17','2026-08-24'];
const PLAN_WEEK_BOOKS = ['剑11','剑12','剑13','剑14','剑15','剑16','剑17','剑18'];
const PLAN_WEEK_PHASES = ['诊断与基础重建','诊断与基础重建','分科强化','分科强化','分科强化','模考冲刺','模考冲刺','考前调整'];

function fmtCNDate(d) { return `${d.getMonth() + 1}月${d.getDate()}日`; }

const PLAN_WEEKS = PLAN_WEEK_STARTS.map((s, i) => {
  const start = new Date(`${s}T00:00:00`);

    color: c.color,
    tasks: c.tpl.map(t => t.replace(/\{B\}/g, book)),
  }));
  return {
    index: i,
    book,
    phase: PLAN_WEEK_PHASES[i],
    range: `${fmtCNDate(start)}–${fmtCNDate(end)}`,
    startDate: start,
    endDate: end,
    categories,
  };
});

const PLAN_ALL_TASK_IDS = [];
PLAN_WEEKS.forEach(w => w.categories.forEach(c => c.tasks.forEach((_, ti) => {
  PLAN_ALL_TASK_IDS.push(`w${w.index}-${c.key}-${ti}`);
})));

function planWeekPercent(week, doneMap) {
  const ids = [];
  week.categories.forEach(c => c.tasks.forEach((_, ti) => ids.push(`w${week.index}-${c.key}-${ti}`)));
  const done = ids.filter(id => doneMap[id]).length;
  return ids.length ? Math.round((done / ids.length) * 100) : 0;
}

function planDefaultWeekIndex() {
  const now = new Date();
  let idx = PLAN_WEEKS.findIndex(w => {
    const endOfDay = new Date(w.endDate);
    endOfDay.setHours(23, 59, 59, 999);
    return now >= w.startDate && now <= endOfDay;
  });
  if (idx === -1) idx = PLAN_WEEKS.findIndex(w => now < w.startDate);
  if (idx === -1) idx = PLAN_WEEKS.length - 1;
  return idx;
}

function playChime(full) {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    const notes = full ? [1046.5, 1318.5, 1568.0, 2093.0] : [1046.5, 1318.5];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = ctx.currentTime + i * 0.09;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.16, start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.28);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + 0.3);
    });
    setTimeout(() => ctx.close(), (notes.length * 0.09 + 0.4) * 1000);
  } catch (e) { console.error('chime failed', e); }
}

  const [customMode, setCustomMode] = useState(false);
  const [secondsLeft, setSecondsLeft] = useState(15 * 60);
  const [running, setRunning] = useState(false);
  const [phase, setPhase] = useState('idle'); // idle | focus | overtime | break | ended
  const [trees, setTrees] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [newestId, setNewestId] = useState(null);
  const [infoId, setInfoId] = useState(null);
  const [celebration, setCelebration] = useState(null); // { msg, particles: [] }
  const [syncStatus, setSyncStatus] = useState('checking'); // checking | synced | offline
  const [planDone, setPlanDone] = useState({}); // { [taskId]: { date } }
  const [planLoaded, setPlanLoaded] = useState(false);
  const [planSyncStatus, setPlanSyncStatus] = useState('checking');
  const [selectedWeek, setSelectedWeek] = useState(planDefaultWeekIndex);
  const intervalRef = useRef(null);
  const startedAtRef = useRef(null);
  const totalSecondsRef = useRef(duration * 60);
  const supabaseRef = useRef(null);
  const planSupabaseRef = useRef(null);

  // load trees: try Supabase first, fall back to local cache if unreachable
  useEffect(() => {
    let channel;
    (async () => {
      try {
        const sb = await getSupabase();
        const { data, error } = await sb
          .from(TABLE)
          .select('*')
          .order('created_at', { ascending: true });
        if (error) throw error;
        supabaseRef.current = sb;
        const mapped = (data || []).map(r => ({
          id: r.id, date: r.date, type: r.type, color: r.color, full: r.is_full, minutes: r.minutes,
        }));
        setTrees(mapped);
        setSyncStatus('synced');

        channel = sb
          .channel('forest-trees-changes')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: TABLE }, (payload) => {
            setTrees(prev => prev.some(t => t.id === payload.new.id)
              ? prev
              : [...prev, {
                  id: payload.new.id, date: payload.new.date, type: payload.new.type,
                  color: payload.new.color, full: payload.new.is_full, minutes: payload.new.minutes,
                }]);
          })
          .subscribe();
      } catch (e) {
        console.error('Supabase unavailable, using local cache:', e);
        try {
          const res = await window.storage.get('forest-trees', false);
          if (res && res.value) setTrees(JSON.parse(res.value));
        } catch (e2) { /* no local cache yet */ }
        setSyncStatus('offline');
      }
      setLoaded(true);
    })();
    return () => { if (channel) channel.unsubscribe(); };
  }, []);

  // always keep a local cache as backup, regardless of sync status
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set('forest-trees', JSON.stringify(trees), false);
      } catch (e) { console.error('local cache save failed', e); }
    })();
  }, [trees, loaded]);

  // load plan checklist: try Supabase first, fall back to local cache if unreachable
  useEffect(() => {
    let channel;
    (async () => {
      try {
        const sb = await getSupabase();
        const { data, error } = await sb.from(PLAN_TABLE).select('*');
        if (error) throw error;
        planSupabaseRef.current = sb;
        const mapped = {};
        (data || []).forEach(r => { mapped[r.id] = { date: r.date }; });
        setPlanDone(mapped);
        setPlanSyncStatus('synced');

        channel = sb
          .channel('plan-progress-changes')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: PLAN_TABLE }, (payload) => {
            setPlanDone(prev => ({ ...prev, [payload.new.id]: { date: payload.new.date } }));
          })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: PLAN_TABLE }, (payload) => {
            setPlanDone(prev => ({ ...prev, [payload.new.id]: { date: payload.new.date } }));
          })
          .on('postgres_changes', { event: 'DELETE', schema: 'public', table: PLAN_TABLE }, (payload) => {
            setPlanDone(prev => {
              const next = { ...prev };
              delete next[payload.old.id];
              return next;
            });
          })
          .subscribe();
      } catch (e) {
        console.error('plan Supabase unavailable, using local cache:', e);
        try {
          const res = await window.storage.get('ielts-plan-progress', false);
          if (res && res.value) setPlanDone(JSON.parse(res.value));
        } catch (e2) { /* nothing saved yet */ }
        setPlanSyncStatus('offline');
      }
      setPlanLoaded(true);
    })();
    return () => { if (channel) channel.unsubscribe(); };
  }, []);

  // always keep a local cache as backup, regardless of sync status
  useEffect(() => {
    if (!planLoaded) return;
    (async () => {
      try {
        await window.storage.set('ielts-plan-progress', JSON.stringify(planDone), false);
      } catch (e) { console.error('plan local cache save failed', e); }
    })();
  }, [planDone, planLoaded]);

  const togglePlanTask = async (id) => {
    const today = todayStr();
    const existing = planDone[id];

    if (existing) {
      if (existing.date !== today) return; // locked once the day has passed
      setPlanDone(prev => {
        const next = { ...prev };
        delete next[id];
        return next;
      });
      if (planSupabaseRef.current) {
        try {
          const { error } = await planSupabaseRef.current.from(PLAN_TABLE).delete().eq('id', id);
          if (error) throw error;
        } catch (e) {
          console.error('plan sync delete failed:', e);
          setPlanSyncStatus('offline');
        }
      }
    } else {
      setPlanDone(prev => ({ ...prev, [id]: { date: today } }));
      if (planSupabaseRef.current) {
        try {
          const { error } = await planSupabaseRef.current.from(PLAN_TABLE).upsert({ id, date: today });
          if (error) throw error;
          setPlanSyncStatus('synced');
        } catch (e) {
          console.error('plan sync insert failed, kept locally:', e);
          setPlanSyncStatus('offline');
        }
      }
    }
  };

  useEffect(() => {
    if (!customMode) setSecondsLeft(duration * 60);
  }, [duration]);

  useEffect(() => {
    if (!running) {
      clearInterval(intervalRef.current);
      return;
    }
    const tick = () => {
      const elapsed = Math.floor((Date.now() - startedAtRef.current) / 1000);
      const remaining = totalSecondsRef.current - elapsed;
      if (remaining <= 0) {
        setSecondsLeft(0);
        setPhase('overtime');
      } else {
        setSecondsLeft(remaining);
      }
    };
    tick(); // sync immediately, don't wait for the first tick
    intervalRef.current = setInterval(tick, 1000);

    const onVisible = () => {
      if (document.visibilityState === 'visible') tick();
    };
    document.addEventListener('visibilitychange', onVisible);

    return () => {
      clearInterval(intervalRef.current);
      document.removeEventListener('visibilitychange', onVisible);
    };
  }, [running]);

  const format = (s) => {
    const m = Math.floor(Math.abs(s) / 60).toString().padStart(2, '0');
    const sec = (Math.abs(s) % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  };

  const start = () => {
    startedAtRef.current = Date.now();
    totalSecondsRef.current = duration * 60;
    setPhase('focus');
    setRunning(true);
  };

  const planTree = async (full) => {
    const task = TASKS.find(t => t.id === taskId);
    const elapsedMin = startedAtRef.current
      ? Math.max(1, Math.round((Date.now() - startedAtRef.current) / 60000))
      : duration;
    const entry = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
      date: todayStr(),
      type: taskId,
      color: task.color,
      full,
      minutes: elapsedMin,
      overtime: elapsedMin > duration,
    };
    setTrees(prev => [...prev, entry]);
    setNewestId(entry.id);
    setTimeout(() => setNewestId(null), 600);
    playChime(full);
    const emojiPool = full ? ['\uD83C\uDF32', '\uD83C\uDF32', '\u2728', '\uD83C\uDF32', '\u2728', '\uD83C\uDF89'] : ['\uD83C\uDF31', '\u2728', '\uD83C\uDF31'];
    const particles = Array.from({ length: full ? 7 : 5 }, (_, i) => ({
      id: `${entry.id}-p${i}`,
      emoji: emojiPool[Math.floor(Math.random() * emojiPool.length)],
      left: 50 + (Math.random() * 70 - 35),
      rotate: Math.random() * 60 - 30,
      delay: Math.random() * 0.15,
      drift: Math.random() * 40 - 20,
      size: 16 + Math.random() * 10,
    }));
    setCelebration({ msg: full ? '\uD83C\uDF32 Tree planted!' : '\uD83C\uDF31 Sprout saved!', particles });
    setTimeout(() => setCelebration(null), 1300);

    if (supabaseRef.current) {
      try {
        const { id, date, type, color, minutes } = entry;
        const row = { id, date, type, color, minutes, is_full: entry.full };
        const { error } = await supabaseRef.current.from(TABLE).insert(row);
        if (error) throw error;
        setSyncStatus('synced');
      } catch (e) {
        console.error('sync insert failed, kept locally:', e);
        setSyncStatus('offline');
      }
    }
  };

  const deleteTree = async (id) => {
    const target = trees.find(t => t.id === id);
    if (!target || target.date !== todayStr()) return; // locked once the day has passed
    setTrees(prev => prev.filter(t => t.id !== id));
    if (supabaseRef.current) {
      try {
        const { error } = await supabaseRef.current.from(TABLE).delete().eq('id', id);
        if (error) throw error;
      } catch (e) {
        console.error('sync delete failed:', e);
        setSyncStatus('offline');
      }
    }
  };

  const treeSize = (minutes) => {
    const m = minutes || 15;
    return Math.min(1.9, 0.55 + m / 35);
  };

  const finishFull = () => {
    planTree(true);
    setRunning(false);
    setPhase('idle');
    setSecondsLeft(duration * 60);
  };

  const stopEarly = () => {
    // ADHD-friendly: interruption still counts, just as a sprout not a full tree
    planTree(false);
    setRunning(false);
    setPhase('idle');
    setSecondsLeft(duration * 60);
  };

  const keepGoing = () => {
    setPhase('focus');
  };

  const todayTrees = trees.filter(t => t.date === todayStr());
  const totalTrees = trees.length;

  const planDoneCount = PLAN_ALL_TASK_IDS.filter(id => planDone[id]).length;
  const planTotalCount = PLAN_ALL_TASK_IDS.length;
  const planPercent = planTotalCount ? Math.round((planDoneCount / planTotalCount) * 100) : 0;
  const currentPlanWeek = PLAN_WEEKS[selectedWeek];

  const currentTaskColor = TASKS.find(t => t.id === taskId).color;
  const progress = phase === 'overtime' ? 1 : 1 - secondsLeft / (duration * 60);
  const R = 70, C = 2 * Math.PI * R;
  const dash = C * (1 - progress);

  const cx = 90, cy = 90, clipR = R + 12;
  const sweep = Math.min(progress, 0.9999) * 360;
  const rad = (deg) => (deg - 90) * Math.PI / 180;
  const endX = cx + clipR * Math.cos(rad(sweep));
  const endY = cy + clipR * Math.sin(rad(sweep));
  const largeArc = sweep > 180 ? 1 : 0;
  const pieClipD = progress <= 0
    ? `M ${cx} ${cy} Z`
    : `M ${cx} ${cy} L ${cx} ${cy - clipR} A ${clipR} ${clipR} 0 ${largeArc} 1 ${endX} ${endY} Z`;

  return (
    <div id="app">
      <div className="title-block">
        <h1>Study Forest</h1>
        <p>You choose the length - interruptions still count - plant a tree per focus session</p>
      </div>

      <div className="card">
        <div className="task-row">
          {TASKS.map(t => (
            <button
              key={t.id}
              className={`task-chip ${taskId === t.id ? 'active' : ''}`}
              onClick={() => setTaskId(t.id)}
              disabled={running}
            >
              <span className="dot" style={{ background: t.color }}></span>
              {t.label}
            </button>
          ))}
        </div>

        <div className="timer-wrap">
          {celebration && (
            <>
              <div className="toast-pop">{celebration.msg}</div>
              {celebration.particles.map(p => (
                <span
                  key={p.id}
                  className="burst-emoji"
                  style={{
                    left: `${p.left}%`,
                    fontSize: `${p.size}px`,
                    animationDelay: `${p.delay}s`,
                    '--rotate': `${p.rotate}deg`,
                    '--drift': `${p.drift}px`,
                  }}
                >{p.emoji}</span>
              ))}
            </>
          )}
          <svg width="180" height="180" viewBox="0 0 180 180">
            <defs>
              <clipPath id="progressClip">
                <path d={pieClipD} />
              </clipPath>
              <linearGradient id="flowGradient" gradientUnits="userSpaceOnUse" x1="20" y1="90" x2="160" y2="90">
                <stop offset="0%" stopColor="var(--line)" stopOpacity="0.25" />
                <stop offset="42%" stopColor={currentTaskColor} stopOpacity="0.55" />
                <stop offset="50%" stopColor={currentTaskColor} stopOpacity="1" />
                <stop offset="58%" stopColor={currentTaskColor} stopOpacity="0.55" />
                <stop offset="100%" stopColor="var(--line)" stopOpacity="0.25" />
                <animateTransform
                  attributeName="gradientTransform"
                  type="rotate"
                  from="0 90 90"
                  to="360 90 90"
                  dur="2.4s"
                  repeatCount="indefinite"
                />
              </linearGradient>
            </defs>
            <circle
              cx="90" cy="90" r={R} fill="none"
              stroke="url(#flowGradient)" strokeWidth="9"
              strokeLinecap="round"
            />
            <circle
              cx="90" cy="90" r={R} fill="none"
              stroke={phase === 'overtime' ? 'var(--seal)' : currentTaskColor}
              strokeWidth="9"
              strokeLinecap="round"
              clipPath="url(#progressClip)"
            />
            <text x="90" y="84" textAnchor="middle" className="timer-num">
              {phase === 'overtime' ? `+${format(Math.floor((Date.now()-startedAtRef.current)/1000) - duration*60)}` : format(secondsLeft)}
            </text>
            <text x="90" y="104" textAnchor="middle" className="timer-label">
              {phase === 'idle' && 'Start when ready'}
              {phase === 'focus' && 'Focusing'}
              {phase === 'overtime' && 'Still in it - keep going'}
            </text>
          </svg>
        </div>

        {phase === 'idle' && (
          <>
            <div className="dur-row">
              {DURATIONS.map(d => (
                <button key={d} className={`dur-chip ${!customMode && duration === d ? 'active' : ''}`}
                  onClick={() => { setCustomMode(false); setDuration(d); }}>
                  {d}m
                </button>
              ))}
              <button className={`dur-chip ${customMode ? 'active' : ''}`}
                onClick={() => setCustomMode(true)}>Custom</button>
            </div>
            {customMode && (
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:10, marginBottom:16}}>
                <button className="btn btn-ghost" style={{padding:'6px 12px'}}
                  onClick={() => setDuration(d => Math.max(3, d-5))}>-5</button>
                <span style={{fontWeight:700, fontSize:15}}>{duration} min</span>
                <button className="btn btn-ghost" style={{padding:'6px 12px'}}
                  onClick={() => setDuration(d => Math.min(90, d+5))}>+5</button>
              </div>
            )}
          </>
        )}

        {phase === 'overtime' && (
          <div className="prompt-box">
            <p>Time's up - how are you feeling?</p>
            <div className="prompt-actions">
              <button className="prompt-btn continue" onClick={keepGoing}>Still in it, keep going</button>
              <button className="prompt-btn rest" onClick={finishFull}>Plant tree, take a break</button>
            </div>
          </div>
        )}

        <div className="main-actions">
          {phase === 'idle' && (
            <button className="btn btn-primary" onClick={start}>Start focusing</button>
          )}
          {(phase === 'focus') && (
            <>
              <button className="btn btn-ghost" onClick={stopEarly}>Stop early (still counts)</button>
              <button className="btn btn-primary" onClick={finishFull}>Done</button>
            </>
          )}
        </div>

        <p className="soft-note">
          Losing focus or getting interrupted is fine - stopping early still plants a sprout. No need to start over.
        </p>
      </div>

      <div className="card plan-card">
        <div className="plan-head">
          <h2>雅思备考计划 · 8周</h2>
          <span className="plan-stats">
            {planSyncStatus === 'synced' && '已同步 · '}
            {planSyncStatus === 'offline' && '离线（本地保存）· '}
            {planSyncStatus === 'checking' && '连接中... · '}
            {planDoneCount}/{planTotalCount} 完成
          </span>
        </div>

        <div className="rainbow-track">
          <div className="rainbow-fill" style={{ width: `${planPercent}%` }}></div>
          <span className="rainbow-pct">{planPercent}%</span>
        </div>

        <div className="week-row">
          {PLAN_WEEKS.map(w => (
            <button
              key={w.index}
              className={`week-chip ${selectedWeek === w.index ? 'active' : ''}`}
              onClick={() => setSelectedWeek(w.index)}
            >
              <span>第{w.index + 1}周</span>
              <span className="week-chip-pct">{planWeekPercent(w, planDone)}%</span>
            </button>
          ))}
        </div>

        <div className="week-detail-head">
          <strong>{currentPlanWeek.range}</strong>
          <span>{currentPlanWeek.phase} · 使用：{currentPlanWeek.book}</span>
        </div>

        {currentPlanWeek.categories.map(cat => (
          <div className="plan-cat" key={cat.key}>
            <div className="plan-cat-head">
              <span className="dot" style={{ background: cat.color }}></span>
              {cat.label}
            </div>
            {cat.tasks.map((task, ti) => {
              const id = `w${currentPlanWeek.index}-${cat.key}-${ti}`;
              const entry = planDone[id];
              const checked = !!entry;
              const locked = checked && entry.date !== todayStr();
              return (
                <label key={id} className={`plan-task ${checked ? 'done' : ''} ${locked ? 'locked' : ''}`}>
                  <input
                    type="checkbox"
                    checked={checked}
                    disabled={locked}
                    onChange={() => togglePlanTask(id)}
                  />
                  <span>{task}</span>
                  {locked && <span className="lock-badge" title="已过当天，锁定不可修改">&#128274;</span>}
                </label>
              );
            })}
          </div>
        ))}
      </div>

      <div className="card forest-card">
        <div className="forest-head">
          <h2>My Forest</h2>
          <span className="forest-stats">
            {syncStatus === 'synced' && 'Synced - '}
            {syncStatus === 'offline' && 'Offline (saved locally) - '}
            {syncStatus === 'checking' && 'Connecting... - '}
            Today {todayTrees.length} - Total {totalTrees}
          </span>
        </div>
        <div className="forest-grid">
          {trees.length === 0 && <div className="empty-forest">No trees yet - start your first focus session</div>}
          {trees.slice().reverse().map(t => (
            <div
              key={t.id}
              className={`tree-slot ${t.id === newestId ? 'tree-new' : ''}`}
              onClick={() => setInfoId(prev => prev === t.id ? null : t.id)}
            >
              {infoId === t.id && (
                <div className="tree-info">
                  {t.minutes} min{t.full ? '' : ' (sprout)'}{t.overtime ? ' \u2b50' : ''}
                </div>
              )}
              {t.date === todayStr() && (
                <button
                  className="tree-delete"
                  onClick={(e) => { e.stopPropagation(); deleteTree(t.id); }}
                  title="Remove this tree"
                  aria-label="Remove this tree"
                >&times;</button>
              )}
              {t.full
                ? <Pine color={t.color} size={treeSize(t.minutes)} seal star={t.overtime} />
                : <Sprout color={t.color} size={treeSize(t.minutes)} star={t.overtime} />}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
